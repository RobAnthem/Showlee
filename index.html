<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showlee - TV Show Guessing Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
        }

        /* Vibrant High-Contrast Colors */
        .correct { background-color: #00FF00 !important; border-color: #00CC00 !important; color: #000 !important; }
        .partial { background-color: #FFD700 !important; border-color: #CCAC00 !important; color: #000 !important; }
        .incorrect { background-color: #FF1a1a !important; border-color: #CC0000 !important; color: #fff !important; }

        /* Unified Grid System */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            width: 100%;
        }

        .cell {
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 800;
            font-size: 0.65rem;
            border: 2px solid #334155;
            border-radius: 8px;
            padding: 4px;
            background: #1e293b;
            overflow: hidden;
            word-break: break-word;
        }

        .poster-cell {
            padding: 0;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .poster-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            color: white !important;
            font-size: 0.6rem;
            line-height: 1.1;
        }

        /* Summary Boxes Uniform Sizing */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
        }

        .summary-box {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 12px;
            padding: 4px;
            text-align: center;
            aspect-ratio: 1/1; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            overflow: hidden;
        }
        
        .summary-box.found { border-color: #00FF00; background: #00FF00; color: #000; }
        .summary-box.partial-found { border-color: #FFD700; background: #FFD700; color: #000; }

        .autocomplete-items {
            position: absolute;
            z-index: 99;
            top: 100%;
            left: 0;
            right: 0;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 0 0 16px 16px;
            max-height: 300px;
            overflow-y: auto;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.7);
        }

        .autocomplete-item {
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .autocomplete-item:hover { background-color: #334155; }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: #1e293b;
            border-radius: 4px;
            margin: 12px 0;
            overflow: hidden;
            border: 1px solid #334155;
        }
        
        .progress-bar-fill {
            height: 100%;
            background: #6366f1;
            width: 0%;
            transition: width 0.4s ease;
        }

        #hintButton:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            filter: grayscale(1);
        }
        
        .flip { animation: flip-cell 0.5s ease forwards; }
        @keyframes flip-cell {
            0% { transform: rotateX(90deg); }
            100% { transform: rotateX(0deg); }
        }

        .tmdb-attribution {
            margin-top: 3rem;
            padding: 2rem 1rem;
            border-top: 1px solid #334155;
            text-align: center;
            color: #94a3b8;
            font-size: 0.7rem;
        }

        .tmdb-logo {
            width: 100px;
            height: auto;
            margin: 0 auto 0.75rem;
            display: block;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-2xl flex justify-between items-center py-4 border-b border-slate-700 mb-6">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 p-2 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="15" x="2" y="7" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tighter italic">SHOWLEE</h1>
        </div>
        <div class="flex flex-col items-end">
            <div class="text-[10px] font-black tracking-widest text-indigo-400 uppercase">
                Streak: <span id="currentStreak">0</span> | Best: <span id="bestStreak">0</span>
            </div>
        </div>
    </header>

    <main class="w-full max-w-2xl flex-grow">
        <div id="uploadContainer" class="hidden bg-slate-800/40 border-2 border-dashed border-slate-700 rounded-3xl p-12 text-center">
            <h3 class="text-xl font-bold mb-4">TV Database Missing</h3>
            <label class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-8 rounded-xl cursor-pointer transition inline-block">
                Load CSV File
                <input type="file" id="fileInput" accept=".csv" class="hidden">
            </label>
        </div>

        <div id="gameInterface" class="hidden">
            <div id="statusMessage" class="hidden mb-8 p-6 rounded-3xl bg-slate-800 border-2 border-slate-700 text-center shadow-2xl">
                <img id="final-reveal-img" src="" alt="Poster" class="w-32 h-48 object-cover rounded-xl mx-auto mb-4 hidden shadow-2xl">
                <h2 id="statusTitle" class="text-2xl font-black mb-1"></h2>
                <p id="statusDesc" class="text-slate-400 mb-4"></p>
                <button onclick="resetGame()" class="bg-indigo-600 text-white font-bold py-2 px-6 rounded-xl hover:bg-indigo-500 transition">
                    PLAY AGAIN
                </button>
            </div>

            <!-- Dashboard -->
            <div class="summary-grid mb-8">
                <div id="sum-genre" class="summary-box">
                    <div class="text-[8px] uppercase opacity-60 font-black mb-1">Genre</div>
                    <div class="text-[10px] font-bold">?</div>
                </div>
                <div id="sum-date" class="summary-box">
                    <div class="text-[8px] uppercase opacity-60 font-black mb-1">Year</div>
                    <div class="text-[10px] font-bold italic opacity-40">...</div>
                </div>
                <div id="sum-seasons" class="summary-box">
                    <div class="text-[8px] uppercase opacity-60 font-black mb-1">Seas</div>
                    <div class="text-[10px] font-bold">?</div>
                </div>
                <div id="sum-lang" class="summary-box">
                    <div class="text-[8px] uppercase opacity-60 font-black mb-1">Lang</div>
                    <div class="text-[10px] font-bold">?</div>
                </div>
                <div id="sum-country" class="summary-box">
                    <div class="text-[8px] uppercase opacity-60 font-black mb-1">Ctry</div>
                    <div class="text-[10px] font-bold">?</div>
                </div>
                <div id="sum-rating" class="summary-box">
                    <div class="text-[8px] uppercase opacity-60 font-black mb-1">Score</div>
                    <div class="text-[10px] font-bold">?</div>
                </div>
            </div>

            <!-- Input and Hint -->
            <div id="inputSection" class="relative max-w-md mx-auto mb-8">
                <div class="flex gap-2">
                    <div class="relative flex-grow">
                        <input id="showInput" type="text" placeholder="Type a show name..." autocomplete="off"
                            class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl px-5 py-3 focus:outline-none focus:border-indigo-500 transition shadow-xl text-sm">
                        <div id="autocompleteList" class="autocomplete-items hidden"></div>
                    </div>
                    <button id="hintButton" onclick="useHint()" disabled class="bg-amber-400 hover:bg-amber-300 text-black font-black px-4 rounded-2xl shadow-lg flex flex-col items-center justify-center text-[9px] transition-all">
                        HINT
                    </button>
                </div>
                
                <div class="mt-4">
                    <div class="progress-bar-container">
                        <div id="progressBarFill" class="progress-bar-fill"></div>
                    </div>
                    <div id="guessesLeft" class="text-center text-[10px] uppercase font-bold tracking-widest text-slate-500">
                        10 guesses remaining
                    </div>
                </div>
            </div>

            <!-- Headers -->
            <div class="game-grid mb-2 text-[9px] uppercase font-black text-slate-500 text-center tracking-widest">
                <div>Poster</div>
                <div>Genre</div>
                <div>Year</div>
                <div>Seas</div>
                <div>Lang</div>
                <div>Ctry</div>
                <div>Score</div>
            </div>

            <!-- Board -->
            <div id="gameBoard" class="flex flex-col gap-2 mb-10"></div>
        </div>
    </main>

    <footer class="w-full max-w-2xl tmdb-attribution">
        <a href="https://www.themoviedb.org/" target="_blank" rel="noopener noreferrer">
            <img src="https://www.themoviedb.org/assets/2/v4/logos/v2/blue_square_2-d537610632e749910f30001f99bab2ae3fc15a465a3bc6b140c2b3e573fab9b0.svg" alt="TMDB Logo" class="tmdb-logo">
        </a>
        <p>This product uses the TMDB API but is not endorsed or certified by TMDB.</p>
    </footer>

    <script>
        const languageNames = new Intl.DisplayNames(['en'], {type: 'language'});
        let tvShows = [];
        let targetShow;
        let guesses = [];
        const MAX_GUESSES = 10;
        
        let minYearBound = 1900;
        let maxYearBound = new Date().getFullYear();
        let yearGuessed = false;
        let discoveredGenres = new Set();
        let hintUsed = false;
        let streakData = { current: 0, best: 0 };

        const fileInput = document.getElementById('fileInput');
        const gameInterface = document.getElementById('gameInterface');
        const gameBoard = document.getElementById('gameBoard');
        const showInput = document.getElementById('showInput');
        const autocompleteList = document.getElementById('autocompleteList');
        const guessesLeftDisplay = document.getElementById('guessesLeft');
        const progressBarFill = document.getElementById('progressBarFill');
        const hintButton = document.getElementById('hintButton');

        window.addEventListener('DOMContentLoaded', async () => {
            const saved = localStorage.getItem('showlee_streak_vibrant_v2');
            if (saved) {
                streakData = JSON.parse(saved);
                document.getElementById('currentStreak').textContent = streakData.current;
                document.getElementById('bestStreak').textContent = streakData.best;
            }
            
            try {
                const response = await fetch('tv_metadata_clean_2026-03-07.csv');
                if (!response.ok) throw new Error('Not found');
                const text = await response.text();
                tvShows = parseCSV(text);
                if (tvShows.length > 0) initGame();
            } catch (err) {
                document.getElementById('uploadContainer').classList.remove('hidden');
            }
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                tvShows = parseCSV(event.target.result);
                if (tvShows.length > 0) initGame();
            };
            reader.readAsText(file);
        });

        /**
         * Robust CSV Parser that handles quoted strings with commas.
         */
        function parseCSV(text) {
            const rows = [];
            const lines = text.split(/\r?\n/);
            if (lines.length === 0) return [];
            
            const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
            const getIdx = (n) => headers.indexOf(n);

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                // Simple state machine to split by comma while respecting quotes
                const cells = [];
                let currentCell = "";
                let inQuotes = false;
                for (let char of line) {
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        cells.push(currentCell.trim());
                        currentCell = "";
                    } else {
                        currentCell += char;
                    }
                }
                cells.push(currentCell.trim());

                if (cells.length < headers.length - 2) continue; 
                
                try {
                    const name = cells[getIdx('Name')]?.replace(/"/g, '').trim();
                    if (!name || name === '[Deleted/Not Found]') continue;

                    const genreStr = cells[getIdx('Genres')] || "";
                    const genres = genreStr.replace(/"/g, '').split(',').map(g => g.trim()).filter(g => g && g !== 'N/A' && g !== '-');
                    
                    rows.push({
                        title: name,
                        year: parseInt(cells[getIdx('Year')]) || 0,
                        genres: genres.length ? genres : ["Other"],
                        country: cells[getIdx('Country')]?.replace(/"/g, '') || "??",
                        lang: cells[getIdx('Language')]?.replace(/"/g, '') || "??",
                        seasons: parseInt(cells[getIdx('Seasons')]) || 0,
                        score: parseFloat(cells[getIdx('User_Score')]) || 0,
                        poster: cells[getIdx('Poster_URL')] ? cells[getIdx('Poster_URL')].replace(/"/g, '').trim() : ""
                    });
                } catch (e) { console.warn("Error parsing row", i, e); }
            }
            return rows;
        }

        function initGame() {
            document.getElementById('uploadContainer').classList.add('hidden');
            gameInterface.classList.remove('hidden');
            resetGame();
        }

        function resetGame() {
            const pool = tvShows.filter(s => s.poster && s.year > 1950 && s.score > 0);
            if (pool.length === 0) return;
            targetShow = pool[Math.floor(Math.random() * pool.length)];
            
            guesses = [];
            minYearBound = 1900;
            maxYearBound = new Date().getFullYear();
            yearGuessed = false;
            discoveredGenres = new Set();
            hintUsed = false;

            gameBoard.innerHTML = "";
            showInput.value = "";
            autocompleteList.classList.add('hidden');
            document.getElementById('inputSection').classList.remove('hidden');
            document.getElementById('statusMessage').classList.add('hidden');
            
            updateGuessesLeft();

            const summaryIds = ['sum-genre', 'sum-date', 'sum-seasons', 'sum-lang', 'sum-country', 'sum-rating'];
            summaryIds.forEach(id => {
                const el = document.getElementById(id);
                el.classList.remove('found', 'partial-found');
                const valEl = el.querySelector('div:last-child');
                valEl.textContent = id === 'sum-date' ? "Searching..." : "?";
                if (id === 'sum-date') valEl.classList.add('italic', 'opacity-40');
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateGuessesLeft() {
            const count = guesses.length;
            const left = MAX_GUESSES - count;
            guessesLeftDisplay.textContent = `${left} ${left === 1 ? 'guess' : 'guesses'} remaining`;
            progressBarFill.style.width = `${(count / MAX_GUESSES) * 100}%`;
            hintButton.disabled = (count < 5 || hintUsed);
        }

        function useHint() {
            if (hintUsed || guesses.length < 5) return;
            hintUsed = true;
            hintButton.disabled = true;

            const unsolved = [];
            if (!yearGuessed) unsolved.push('sum-date');
            if (discoveredGenres.size < targetShow.genres.length) unsolved.push('sum-genre');
            if (!document.getElementById('sum-seasons').classList.contains('found')) unsolved.push('sum-seasons');
            if (!document.getElementById('sum-lang').classList.contains('found')) unsolved.push('sum-lang');
            if (!document.getElementById('sum-country').classList.contains('found')) unsolved.push('sum-country');
            if (!document.getElementById('sum-rating').classList.contains('found')) unsolved.push('sum-rating');

            if (unsolved.length === 0) return;
            const chosenId = unsolved[Math.floor(Math.random() * unsolved.length)];
            const el = document.getElementById(chosenId);
            const valEl = el.querySelector('div:last-child');
            el.classList.add('found');

            if (chosenId === 'sum-genre') {
                targetShow.genres.forEach(g => discoveredGenres.add(g));
                valEl.textContent = targetShow.genres.join(", ");
            } else if (chosenId === 'sum-date') {
                yearGuessed = true;
                valEl.textContent = targetShow.year;
                valEl.classList.remove('italic', 'opacity-40');
            } else if (chosenId === 'sum-seasons') {
                valEl.textContent = targetShow.seasons;
            } else if (chosenId === 'sum-lang') {
                valEl.textContent = languageNames.of(targetShow.lang) || targetShow.lang.toUpperCase();
            } else if (chosenId === 'sum-country') {
                valEl.textContent = targetShow.country;
            } else if (chosenId === 'sum-rating') {
                valEl.textContent = targetShow.score;
            }
        }

        function submitGuess(show) {
            if (guesses.some(g => g.title === show.title)) return;
            guesses.push(show);
            renderRow(show);
            updateSummary(show);
            updateGuessesLeft();
            showInput.value = "";
            autocompleteList.classList.add('hidden');
            if (show.title === targetShow.title) endGame(true);
            else if (guesses.length >= MAX_GUESSES) endGame(false);
        }

        function renderRow(guess) {
            const row = document.createElement('div');
            row.className = 'game-grid';
            
            const fields = [
                { type: 'title', val: guess.title },
                { type: 'genres', val: guess.genres },
                { type: 'year', val: guess.year },
                { type: 'seasons', val: guess.seasons },
                { type: 'lang', val: guess.lang },
                { type: 'country', val: guess.country },
                { type: 'score', val: guess.score }
            ];

            fields.forEach((field, i) => {
                const cell = document.createElement('div');
                cell.className = 'cell flip';
                cell.style.animationDelay = `${i * 100}ms`;

                if (field.type === 'title') {
                    cell.classList.add('poster-cell');
                    if (guess.poster) cell.style.backgroundImage = `url(${guess.poster})`;
                    const overlay = document.createElement('div');
                    overlay.className = 'poster-overlay';
                    overlay.textContent = field.val;
                    cell.appendChild(overlay);
                    cell.classList.add(field.val === targetShow.title ? 'correct' : 'incorrect');
                } else if (field.type === 'genres') {
                    cell.textContent = field.val.join(", ");
                    const common = field.val.filter(g => targetShow.genres.includes(g));
                    if (common.length === targetShow.genres.length && field.val.length === targetShow.genres.length) cell.classList.add('correct');
                    else if (common.length > 0) cell.classList.add('partial');
                    else cell.classList.add('incorrect');
                } else if (field.type === 'year') {
                    cell.innerHTML = `<div>${field.val}</div>`;
                    if (field.val === targetShow.year) cell.classList.add('correct');
                    else {
                        if (Math.abs(field.val - targetShow.year) <= 2) cell.classList.add('partial');
                        else cell.classList.add('incorrect');
                        cell.innerHTML += `<div class="mt-1 opacity-60">${field.val < targetShow.year ? '↑' : '↓'}</div>`;
                    }
                } else if (field.type === 'seasons') {
                    cell.innerHTML = `<div>${field.val}</div>`;
                    if (field.val === targetShow.seasons) cell.classList.add('correct');
                    else {
                        if (Math.abs(field.val - targetShow.seasons) <= 1) cell.classList.add('partial');
                        else cell.classList.add('incorrect');
                        cell.innerHTML += `<div class="mt-1 opacity-60">${field.val < targetShow.seasons ? '↑' : '↓'}</div>`;
                    }
                } else if (field.type === 'lang') {
                    cell.textContent = field.val.toUpperCase();
                    cell.classList.add(field.val === targetShow.lang ? 'correct' : 'incorrect');
                } else if (field.type === 'country') {
                    cell.textContent = field.val;
                    cell.classList.add(field.val === targetShow.country ? 'correct' : 'incorrect');
                } else if (field.type === 'score') {
                    cell.innerHTML = `<div>${field.val}</div>`;
                    const diff = Math.abs(field.val - targetShow.score);
                    if (diff === 0) cell.classList.add('correct');
                    else {
                        if (diff <= 0.5) cell.classList.add('partial');
                        else cell.classList.add('incorrect');
                        cell.innerHTML += `<div class="mt-1 opacity-60">${field.val < targetShow.score ? '↑' : '↓'}</div>`;
                    }
                }
                row.appendChild(cell);
            });
            gameBoard.prepend(row);
        }

        function updateSummary(guess) {
            const genreBox = document.getElementById('sum-genre');
            if (!genreBox.classList.contains('found')) {
                const common = guess.genres.filter(g => targetShow.genres.includes(g));
                common.forEach(g => discoveredGenres.add(g));
                if (discoveredGenres.size > 0) {
                    genreBox.querySelector('div:last-child').textContent = Array.from(discoveredGenres).sort().join(", ");
                    if (discoveredGenres.size === targetShow.genres.length) {
                        genreBox.classList.remove('partial-found');
                        genreBox.classList.add('found');
                    } else genreBox.classList.add('partial-found');
                }
            }

            if (!yearGuessed) {
                if (guess.year === targetShow.year) {
                    yearGuessed = true;
                    const el = document.getElementById('sum-date');
                    el.classList.add('found');
                    el.querySelector('div:last-child').textContent = targetShow.year;
                    el.querySelector('div:last-child').classList.remove('italic', 'opacity-40');
                } else if (guess.year !== 0) {
                    if (guess.year < targetShow.year) minYearBound = Math.max(minYearBound, guess.year);
                    else maxYearBound = Math.min(maxYearBound, guess.year);
                    document.getElementById('sum-date').querySelector('div:last-child').textContent = `${minYearBound} — ${maxYearBound}`;
                }
            }

            const check = [
                { id: 'sum-seasons', val: guess.seasons, target: targetShow.seasons, display: guess.seasons },
                { id: 'sum-lang', val: guess.lang, target: targetShow.lang, display: languageNames.of(guess.lang) || guess.lang.toUpperCase() },
                { id: 'sum-country', val: guess.country, target: targetShow.country, display: guess.country },
                { id: 'sum-rating', val: guess.score, target: targetShow.score, display: guess.score }
            ];

            check.forEach(k => {
                const el = document.getElementById(k.id);
                if (!el.classList.contains('found') && k.val === k.target) {
                    el.classList.add('found');
                    el.querySelector('div:last-child').textContent = k.display;
                }
            });
        }

        function endGame(won) {
            document.getElementById('inputSection').classList.add('hidden');
            const statusMsg = document.getElementById('statusMessage');
            statusMsg.classList.remove('hidden');

            if (won) {
                streakData.current++;
                if (streakData.current > streakData.best) streakData.best = streakData.current;
            } else streakData.current = 0;
            
            localStorage.setItem('showlee_streak_vibrant_v2', JSON.stringify(streakData));
            document.getElementById('currentStreak').textContent = streakData.current;
            document.getElementById('bestStreak').textContent = streakData.best;
            
            const summaryUpdates = [
                { id: 'sum-genre', val: targetShow.genres.join(", ") },
                { id: 'sum-date', val: targetShow.year },
                { id: 'sum-seasons', val: targetShow.seasons },
                { id: 'sum-lang', val: languageNames.of(targetShow.lang) || targetShow.lang.toUpperCase() },
                { id: 'sum-country', val: targetShow.country },
                { id: 'sum-rating', val: targetShow.score }
            ];
            summaryUpdates.forEach(upd => {
                const el = document.getElementById(upd.id);
                el.classList.remove('partial-found');
                el.classList.add('found');
                const valEl = el.querySelector('div:last-child');
                valEl.textContent = upd.val;
                valEl.classList.remove('italic', 'opacity-40');
            });

            if (targetShow.poster) {
                const img = document.getElementById('final-reveal-img');
                img.src = targetShow.poster;
                img.classList.remove('hidden');
            }

            document.getElementById('statusTitle').textContent = won ? "VICTORY!" : "GAME OVER";
            document.getElementById('statusTitle').style.color = won ? "#00FF00" : "#FF1a1a";
            document.getElementById('statusDesc').innerHTML = `The show was <strong>${targetShow.title}</strong>.`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        showInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            if (val.length < 2) { autocompleteList.classList.add('hidden'); return; }
            const filtered = tvShows
                .filter(s => s.title.toLowerCase().includes(val))
                .slice(0, 10);
            
            autocompleteList.innerHTML = "";
            if (filtered.length > 0) {
                autocompleteList.classList.remove('hidden');
                filtered.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'autocomplete-item';
                    div.innerHTML = `
                        <div class="flex flex-col gap-0.5">
                            <span class="font-bold text-sm text-white">${item.title}</span>
                            <span class="text-[10px] text-amber-300 font-extrabold uppercase tracking-tight">${item.genres.slice(0,2).join(" • ")}</span>
                        </div>
                        <div class="text-xs bg-indigo-900/50 text-indigo-300 px-2 py-0.5 rounded font-black">${item.year}</div>`;
                    div.onclick = () => submitGuess(item);
                    autocompleteList.appendChild(div);
                });
            } else autocompleteList.classList.add('hidden');
        });

        document.addEventListener('click', (e) => {
            if (!showInput.contains(e.target)) autocompleteList.classList.add('hidden');
        });
    </script>
</body>
</html>
