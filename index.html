<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showlee - TV Show Guessing Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0c0d;
            color: #ffffff;
        }

        /* Result Colors */
        .correct { background-color: #1b8a32 !important; border-color: #146425 !important; color: #000000 !important; }
        .partial { background-color: #d1a01d !important; border-color: #a37c15 !important; color: #000000 !important; }
        .incorrect { background-color: #c41e1e !important; border-color: #8c1515 !important; color: #ffffff !important; }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
            width: 100%;
            max-width: 620px;
        }

        .cell {
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 800;
            font-size: 0.65rem;
            line-height: 1.1;
            border: 2px solid #2d2f35;
            text-transform: uppercase;
            transition: all 0.3s ease;
            overflow: hidden;
            word-wrap: break-word;
            padding: 4px;
            box-sizing: border-box;
            border-radius: 2px;
            position: relative;
        }

        .poster-cell { padding: 0; background-size: cover; background-position: center; position: relative; }
        .poster-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.75);
            display: flex; align-items: center; justify-content: center;
            padding: 4px; font-size: 0.6rem; text-align: center; color: white;
        }
        
        .correct .poster-overlay, .partial .poster-overlay { background: transparent; color: #000000 !important; font-weight: 900; }

        .summary-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; width: 100%; max-width: 620px; }
        .summary-box {
            background: #1a1c1e; border: 2px solid #2d2f35; border-radius: 4px;
            padding: 8px 2px; text-align: center; display: flex; flex-direction: column;
            justify-content: center; min-height: 64px;
        }
        
        .summary-box.found { border-color: #1b8a32; background: #1b8a32; }
        .summary-box.partial-found { border-color: #d1a01d; background: #d1a01d; }

        .summary-box.found span, .summary-box.partial-found span { color: #000000 !important; font-weight: 900; }
        
        .hint-container {
            width: 100%; max-width: 620px; background: #1a1c1e; border: 2px solid #2d2f35;
            border-radius: 8px; padding: 16px; margin-bottom: 12px; text-align: center;
        }

        #textHintArea { border-color: #d1a01d; display: none; animation: slideDown 0.4s ease-out; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .autocomplete-items {
            position: absolute; z-index: 99; top: 100%; left: 0; right: 0;
            background: #1a1c1e; border: 1px solid #404249; max-height: 300px;
            overflow-y: auto; border-radius: 4px; margin-top: 4px;
        }

        .autocomplete-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #2d2f35; }
        .autocomplete-item:hover { background-color: #2d2f35; }

        .progress-bar-fill { height: 100%; background: #d1a01d; width: 0%; transition: width 0.4s ease; }

        .mode-btn {
            padding: 6px 12px; font-size: 9px; font-weight: 700; text-transform: uppercase;
            border: 1px solid #404249; background: #1a1c1e; transition: all 0.2s;
        }
        .mode-btn.active { background: #d1a01d; color: black; border-color: #d1a01d; }

        #difficultyModal { background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
        .diff-card { background: #1a1c1e; border: 2px solid #2d2f35; cursor: pointer; }
        .diff-card:hover { border-color: #d1a01d; }

        .flip { animation: flip-cell 0.6s ease forwards; }
        @keyframes flip-cell { 0% { transform: rotateX(90deg); opacity: 0; } 100% { transform: rotateX(0deg); opacity: 1; } }

        .emoji-slot { display: inline-block; width: 1.5em; text-align: center; vertical-align: middle; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- Difficulty Picker -->
    <div id="difficultyModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6">
        <div class="w-full max-w-lg bg-[#0b0c0d] border-2 border-zinc-800 rounded-2xl p-8 shadow-2xl">
            <h3 class="text-2xl font-black italic tracking-tighter mb-2 uppercase">Difficulty</h3>
            <div class="grid grid-cols-1 gap-4 mt-6">
                <div onclick="selectDifficulty('easy')" class="diff-card p-6 rounded-xl group">
                    <h4 class="font-black text-lg group-hover:text-[#d1a01d]">EASY</h4>
                    <p class="text-zinc-500 text-[10px] uppercase">Top 1,500 most popular shows</p>
                </div>
                <div onclick="selectDifficulty('normal')" class="diff-card p-6 rounded-xl group">
                    <h4 class="font-black text-lg group-hover:text-[#d1a01d]">NORMAL</h4>
                    <p class="text-zinc-500 text-[10px] uppercase">Top 3,000 most popular shows</p>
                </div>
                <div onclick="selectDifficulty('hard')" class="diff-card p-6 rounded-xl group">
                    <h4 class="font-black text-lg group-hover:text-[#d1a01d]">HARD</h4>
                    <p class="text-zinc-500 text-[10px] uppercase">All available shows</p>
                </div>
            </div>
        </div>
    </div>

    <header class="w-full max-w-2xl flex flex-col items-center py-6 border-b border-zinc-800 mb-8">
        <div class="flex items-center gap-3 mb-6">
            <h1 class="text-4xl font-black tracking-tighter italic text-[#d1a01d]">SHOWLEE</h1>
        </div>
        
        <div class="w-full grid grid-cols-1 md:grid-cols-2 items-end gap-4 px-2">
            <div class="flex flex-col gap-1">
                <span class="text-[9px] font-black uppercase text-zinc-500">Category</span>
                <div class="flex overflow-hidden rounded-lg">
                    <button id="modeNormal" onclick="setMode('normal')" class="mode-btn active">Mainstream</button>
                    <button id="modeAnime" onclick="setMode('anime')" class="mode-btn">Anime</button>
                    <button id="modeForeign" onclick="setMode('foreign')" class="mode-btn">International</button>
                </div>
            </div>
            <div class="flex flex-col items-end">
                <div class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1">Streak (<span id="streakModeLabel">Mainstream</span>)</div>
                <div class="text-3xl font-black leading-none" id="currentStreak">0</div>
            </div>
        </div>
    </header>

    <main class="w-full max-w-2xl flex-grow flex flex-col items-center">
        <div id="gameInterface" class="w-full flex flex-col items-center">
            
            <div id="statusMessage" class="hidden mb-8 p-8 border-2 border-[#d1a01d] w-full text-center bg-[#1a1c1e] rounded-xl shadow-2xl">
                <img id="final-reveal-img" src="" alt="Poster" class="w-28 h-40 object-cover mx-auto mb-6 rounded-lg border-2 border-zinc-700 hidden">
                <h2 id="statusTitle" class="text-3xl font-black mb-2 italic"></h2>
                <p id="statusDesc" class="text-zinc-400 text-sm mb-6"></p>
                <button onclick="startNewGame()" class="bg-white text-black font-black py-3 px-10 rounded-lg text-sm uppercase">Next Show</button>
            </div>

            <div class="summary-grid mb-6">
                <div id="sum-genre" class="summary-box"><span class="text-[9px] text-zinc-500 uppercase mb-1">Genre</span><span class="text-[10px] font-black">?</span></div>
                <div id="sum-date" class="summary-box"><span class="text-[9px] text-zinc-500 uppercase mb-1">Year</span><span class="text-[11px] font-black">...</span></div>
                <div id="sum-seasons" class="summary-box"><span class="text-[9px] text-zinc-500 uppercase mb-1">Seas</span><span class="text-[11px] font-black">?</span></div>
                <div id="sum-network" class="summary-box"><span class="text-[9px] text-zinc-500 uppercase mb-1">Netw</span><span class="text-[11px] font-black">?</span></div>
                <div id="sum-origin" class="summary-box"><span class="text-[9px] text-zinc-500 uppercase mb-1">Origin</span><span class="text-[11px] font-black">?</span></div>
                <div id="sum-content-rating" class="summary-box"><span class="text-[9px] text-zinc-500 uppercase mb-1">Rating</span><span class="text-[11px] font-black">?</span></div>
                <div id="sum-rating" class="summary-box"><span class="text-[9px] text-zinc-500 uppercase mb-1">Score</span><span class="text-[11px] font-black">?</span></div>
            </div>

            <div id="textHintArea" class="hint-container">
                <div id="plotHintText" class="text-sm font-medium italic text-zinc-300"></div>
            </div>

            <div id="emojiHintArea" class="hint-container">
                <div id="emojiReveal" class="text-3xl flex justify-center gap-2"></div>
            </div>

            <div id="inputSection" class="w-full max-w-md mb-10">
                <div class="relative flex gap-2">
                    <input id="showInput" type="text" placeholder="Type a show..." autocomplete="off"
                        class="flex-grow bg-[#1a1c1e] border-2 border-zinc-800 p-4 rounded-lg focus:outline-none focus:border-[#d1a01d] text-sm font-bold">
                    <button id="hintButton" onclick="useHint()" disabled class="bg-[#1a1c1e] border-2 border-zinc-800 text-zinc-500 font-black px-4 rounded-lg text-[10px] uppercase">Hint</button>
                </div>
                <div class="w-full h-2 bg-zinc-800 rounded mt-4"><div id="progressBarFill" class="progress-bar-fill"></div></div>
                <div id="guessesLeft" class="text-center text-[10px] uppercase font-black text-zinc-500 mt-2">10 CHANCES LEFT</div>
                <div id="autocompleteList" class="autocomplete-items hidden shadow-2xl"></div>
            </div>

            <div id="gameBoard" class="flex flex-col gap-2 w-full items-center mb-12"></div>
        </div>
    </main>

    <script>
        const segmenter = new Intl.Segmenter('en', { granularity: 'grapheme' });
        
        let tvShows = [];
        let emojiMetadata = {};
        let hintMetadata = {};
        let targetShow;
        let guesses = [];
        const MAX_GUESSES = 10;
        
        let currentGameMode = 'normal';
        let currentDifficulty = 'normal';
        let minYearBound = 1900, maxYearBound = new Date().getFullYear();
        let yearGuessed = false, hintUsed = false, isGameOver = false;
        let discoveredGenres = new Set(), discoveredNetworks = new Set();
        let streaks = { normal: { current: 0, best: 0 }, anime: { current: 0, best: 0 }, foreign: { current: 0, best: 0 } };

        window.addEventListener('DOMContentLoaded', async () => {
            const savedStreaks = localStorage.getItem('showlee_streaks_v6');
            if (savedStreaks) streaks = JSON.parse(savedStreaks);
            updateStreakUI();

            try {
                const [showsRes, emojiRes, hintRes] = await Promise.all([
                    fetch('enriched_shows_2026-03-07.csv'),
                    fetch('emoji_metadata.csv'),
                    fetch('show_hints.csv')
                ]);

                const showsText = await showsRes.text();
                tvShows = parseCSV(showsText, 'shows');

                if (emojiRes.ok) emojiMetadata = parseCSV(await emojiRes.text(), 'emoji');
                if (hintRes.ok) hintMetadata = parseCSV(await hintRes.text(), 'hint');

                if (tvShows.length > 0) initGame();
            } catch (err) { console.error(err); }
        });

        function parseCSV(text, type) {
            const lines = text.split(/\r?\n/);
            const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
            const data = type === 'shows' ? [] : {};

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const cells = [];
                let cell = "", inQuotes = false;
                for (let char of line) {
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { cells.push(cell.trim()); cell = ""; }
                    else cell += char;
                }
                cells.push(cell.trim());

                if (type === 'shows') {
                    const getIdx = (n) => headers.indexOf(n);
                    data.push({
                        id: cells[getIdx('ID')],
                        title: (cells[getIdx('Name')] || "").replace(/"/g, ''),
                        year: parseInt(cells[getIdx('Year')]) || 0,
                        genres: (cells[getIdx('Genres')] || "").replace(/"/g, '').split(',').map(g => g.trim()).filter(g => g && g !== '-'),
                        country: (cells[getIdx('Country')] || "").replace(/"/g, '') || "??",
                        lang: (cells[getIdx('Language')] || "").replace(/"/g, '').toLowerCase() || "??",
                        seasons: parseInt(cells[getIdx('Seasons')]) || 0,
                        networks: (cells[getIdx('Networks')] || "").replace(/"/g, '').split(',').map(n => n.trim()).filter(n => n && n !== '-'),
                        contentRating: (cells[getIdx('Rating')] || "").replace(/"/g, '') || "NR",
                        score: parseFloat(cells[getIdx('Vote_Average')]) || 0,
                        votes: parseInt(cells[getIdx('Vote_Count')]) || 0,
                        poster: (cells[getIdx('Poster_URL')] || "").replace(/"/g, '').trim()
                    });
                } else {
                    const id = cells[0].replace(/"/g, '');
                    let content = cells[2]?.replace(/"/g, '') || "";
                    if (type === 'hint') {
                        // Anti-leak cleanup: look for patterns that indicate start of another show's data
                        const patterns = [" -1- ", " The Beatles:", " Begin Again:", " Shelley:", " Queendom:", " Equinox:"];
                        patterns.forEach(p => { if (content.includes(p)) content = content.split(p)[0]; });
                        data[id] = content.trim();
                    } else {
                        data[id] = Array.from(segmenter.segment(content)).map(s => s.segment);
                    }
                }
            }
            return data;
        }

        function initGame() {
            const saved = localStorage.getItem(`showlee_session_v6_${currentGameMode}`);
            if (saved) resumeGame(JSON.parse(saved)); else startNewGame();
        }

        function startNewGame() {
            let pool = tvShows.filter(s => {
                const isAnime = s.genres.includes('Animation') && s.country === 'JP';
                const isEnglish = s.lang === 'en';
                if (currentGameMode === 'anime') return isAnime;
                if (currentGameMode === 'normal') return isEnglish && !isAnime;
                return !isEnglish && !isAnime;
            });
            pool.sort((a, b) => b.votes - a.votes);
            if (currentDifficulty === 'easy') pool = pool.slice(0, 1500);
            else if (currentDifficulty === 'normal') pool = pool.slice(0, 3000);
            
            targetShow = pool[Math.floor(Math.random() * pool.length)] || tvShows[0];
            guesses = []; minYearBound = 1900; maxYearBound = new Date().getFullYear();
            yearGuessed = false; discoveredGenres = new Set(); discoveredNetworks = new Set();
            hintUsed = false; isGameOver = false;
            
            clearUI();
            updateEmojiHint();
            saveSession();
        }

        function clearUI() {
            document.getElementById('gameBoard').innerHTML = "";
            document.getElementById('showInput').value = "";
            document.getElementById('inputSection').classList.remove('hidden');
            document.getElementById('statusMessage').classList.add('hidden');
            document.getElementById('textHintArea').style.display = 'none';
            ['sum-genre', 'sum-date', 'sum-seasons', 'sum-network', 'sum-origin', 'sum-content-rating', 'sum-rating'].forEach(id => {
                const el = document.getElementById(id);
                el.classList.remove('found', 'partial-found');
                el.querySelector('span:last-child').textContent = id === 'sum-date' ? `${minYearBound}—${maxYearBound}` : "?";
            });
            updateGuessesLeft();
        }

        function updateGuessesLeft() {
            const left = MAX_GUESSES - guesses.length;
            document.getElementById('guessesLeft').textContent = `${left} CHANCES LEFT`;
            document.getElementById('progressBarFill').style.width = `${(guesses.length / MAX_GUESSES) * 100}%`;
            document.getElementById('hintButton').disabled = guesses.length < 4 || hintUsed;
        }

        function updateEmojiHint() {
            const el = document.getElementById('emojiReveal');
            const emojis = emojiMetadata[targetShow.id];
            if (!emojis) { el.innerHTML = "No emoji data"; return; }
            el.innerHTML = '';
            const count = isGameOver ? emojis.length : Math.min(1 + guesses.length, emojis.length);
            for (let i = 0; i < 10; i++) {
                const s = document.createElement('span'); s.className = 'emoji-slot';
                if (i < emojis.length) { s.textContent = i < count ? emojis[i] : '⚪'; if (i >= count) s.style.opacity = '0.3'; }
                el.appendChild(s);
            }
        }

        function useHint() {
            if (hintUsed || guesses.length < 4) return;
            hintUsed = true;
            document.getElementById('plotHintText').textContent = hintMetadata[targetShow.id] || "No description available.";
            document.getElementById('textHintArea').style.display = 'block';
            updateGuessesLeft();
            saveSession();
        }

        function submitGuess(show) {
            if (isGameOver || guesses.some(g => g.id === show.id)) return;
            guesses.push(show);
            renderRow(show, true);
            updateSummaryUI(show);
            updateGuessesLeft();
            updateEmojiHint();
            document.getElementById('showInput').value = "";
            document.getElementById('autocompleteList').classList.add('hidden');
            if (show.id === targetShow.id) endGame(true);
            else if (guesses.length >= MAX_GUESSES) endGame(false);
            else saveSession();
        }

        function renderRow(guess, animate) {
            const row = document.createElement('div');
            row.className = 'game-grid';
            const config = [
                { type: 'p', val: guess.title }, { type: 'g', val: guess.genres },
                { type: 'y', val: guess.year }, { type: 's', val: guess.seasons },
                { type: 'n', val: guess.networks }, { type: 'o', val: { lang: guess.lang, country: guess.country } },
                { type: 'cr', val: guess.contentRating }, { type: 'r', val: guess.score }
            ];
            config.forEach((f, i) => {
                const c = document.createElement('div');
                c.className = 'cell';
                if (animate) { c.classList.add('flip'); c.style.animationDelay = `${i * 60}ms`; }
                if (f.type === 'p') {
                    c.classList.add('poster-cell');
                    if (guess.poster) c.style.backgroundImage = `url(${guess.poster})`;
                    const o = document.createElement('div'); o.className = 'poster-overlay'; o.textContent = f.val;
                    c.appendChild(o);
                    c.classList.add(f.val === targetShow.title ? 'correct' : 'incorrect');
                } else if (f.type === 'g' || f.type === 'n') {
                    const targetArr = f.type === 'g' ? targetShow.genres : targetShow.networks;
                    c.textContent = f.val.slice(0, 2).join(", ");
                    const common = f.val.filter(x => targetArr.includes(x));
                    if (common.length === targetArr.length && f.val.length === targetArr.length) c.classList.add('correct');
                    else if (common.length > 0) c.classList.add('partial'); else c.classList.add('incorrect');
                } else if (f.type === 'o') {
                    c.innerHTML = `<span class="text-[8px] opacity-60">${f.val.lang.toUpperCase()}</span><span>${f.val.country}</span>`;
                    if (f.val.lang === targetShow.lang && f.val.country === targetShow.country) c.classList.add('correct');
                    else if (f.val.lang === targetShow.lang || f.val.country === targetShow.country) c.classList.add('partial'); else c.classList.add('incorrect');
                } else {
                    const tv = f.type === 'y' ? targetShow.year : f.type === 's' ? targetShow.seasons : f.type === 'r' ? targetShow.score : targetShow.contentRating;
                    c.textContent = f.val;
                    if (f.val === tv) c.classList.add('correct');
                    else if (typeof f.val === 'number') {
                        const range = f.type === 'y' ? 5 : f.type === 's' ? 1 : 0.5;
                        c.classList.add(Math.abs(f.val - tv) <= range ? 'partial' : 'incorrect');
                        c.innerHTML = `<div>${f.val}</div><div class="text-[8px] opacity-60">${f.val < tv ? '▲' : '▼'}</div>`;
                    } else c.classList.add('incorrect');
                }
                row.appendChild(c);
            });
            document.getElementById('gameBoard').prepend(row);
        }

        function updateSummaryUI(guess) {
            guess.genres.filter(x => targetShow.genres.includes(x)).forEach(x => discoveredGenres.add(x));
            if (discoveredGenres.size > 0) {
                const el = document.getElementById('sum-genre');
                el.querySelector('span:last-child').textContent = Array.from(discoveredGenres).join(", ");
                el.className = `summary-box ${discoveredGenres.size === targetShow.genres.length ? 'found' : 'partial-found'}`;
            }
            guess.networks.filter(x => targetShow.networks.includes(x)).forEach(x => discoveredNetworks.add(x));
            if (discoveredNetworks.size > 0) {
                const el = document.getElementById('sum-network');
                el.querySelector('span:last-child').textContent = Array.from(discoveredNetworks)[0];
                el.className = `summary-box ${discoveredNetworks.size === targetShow.networks.length ? 'found' : 'partial-found'}`;
            }
            if (!yearGuessed) {
                if (guess.year === targetShow.year) {
                    yearGuessed = true; document.getElementById('sum-date').className = "summary-box found";
                    document.getElementById('sum-date').querySelector('span:last-child').textContent = targetShow.year;
                } else if (guess.year > 0) {
                    if (guess.year < targetShow.year) minYearBound = Math.max(minYearBound, guess.year + 1);
                    else maxYearBound = Math.min(maxYearBound, guess.year - 1);
                    document.getElementById('sum-date').querySelector('span:last-child').textContent = `${minYearBound}—${maxYearBound}`;
                }
            }
            ['seasons', 'contentRating', 'score'].forEach(key => {
                if (guess[key] === targetShow[key]) {
                    const id = key === 'contentRating' ? 'sum-content-rating' : key === 'score' ? 'sum-rating' : 'sum-seasons';
                    const el = document.getElementById(id);
                    el.className = "summary-box found"; el.querySelector('span:last-child').textContent = targetShow[key];
                }
            });
        }

        function endGame(won) {
            isGameOver = true;
            document.getElementById('inputSection').classList.add('hidden');
            const sm = document.getElementById('statusMessage');
            sm.classList.remove('hidden');
            const s = streaks[currentGameMode];
            if (won) { s.current++; if (s.current > s.best) s.best = s.current; } else s.current = 0;
            localStorage.setItem('showlee_streaks_v6', JSON.stringify(streaks));
            updateStreakUI();
            if (targetShow.poster) {
                const img = document.getElementById('final-reveal-img');
                img.src = targetShow.poster; img.classList.remove('hidden');
            }
            document.getElementById('statusTitle').textContent = won ? "VICTORY" : "GAME OVER";
            document.getElementById('statusDesc').textContent = `The show was ${targetShow.title}.`;
            updateEmojiHint();
            saveSession();
        }

        // Robust Searching Logic
        document.getElementById('showInput').addEventListener('input', (e) => {
            const v = e.target.value.toLowerCase().trim();
            const al = document.getElementById('autocompleteList');
            if (v.length < 1) { al.classList.add('hidden'); return; }

            // Priority Scoring
            const matches = tvShows.filter(s => s.title.toLowerCase().includes(v))
                .sort((a, b) => {
                    const aT = a.title.toLowerCase();
                    const bT = b.title.toLowerCase();
                    
                    // 1. Exact matches
                    if (aT === v && bT !== v) return -1;
                    if (bT === v && aT !== v) return 1;

                    // 2. Starts with
                    const aStart = aT.startsWith(v);
                    const bStart = bT.startsWith(v);
                    if (aStart && !bStart) return -1;
                    if (bStart && !aStart) return 1;

                    // 3. Length (Shortest first for small queries like 'V')
                    if (v.length < 3) {
                        if (aT.length !== bT.length) return aT.length - bT.length;
                    }

                    // 4. Popularity
                    return b.votes - a.votes;
                })
                .slice(0, 10);

            al.innerHTML = "";
            if (matches.length) {
                al.classList.remove('hidden');
                matches.forEach(m => {
                    const d = document.createElement('div');
                    d.className = 'autocomplete-item text-sm flex justify-between items-center';
                    d.innerHTML = `
                        <div class="flex flex-col text-left">
                            <span class="text-white font-bold">${m.title}</span>
                            <span class="text-zinc-600 text-[10px] uppercase font-bold">${m.networks[0] || 'Unknown'}</span>
                        </div>
                        <span class="text-zinc-500 text-[10px] font-black">${m.year}</span>`;
                    d.onclick = () => submitGuess(m);
                    al.appendChild(d);
                });
            } else al.classList.add('hidden');
        });

        function saveSession() {
            localStorage.setItem(`showlee_session_v6_${currentGameMode}`, JSON.stringify({
                targetShow, guesses, minYearBound, maxYearBound, yearGuessed,
                discoveredGenres: Array.from(discoveredGenres), discoveredNetworks: Array.from(discoveredNetworks),
                hintUsed, isGameOver, difficulty: currentDifficulty
            }));
        }

        function resumeGame(session) {
            targetShow = session.targetShow; guesses = []; 
            minYearBound = session.minYearBound; maxYearBound = session.maxYearBound;
            yearGuessed = session.yearGuessed; hintUsed = session.hintUsed;
            discoveredGenres = new Set(session.discoveredGenres);
            discoveredNetworks = new Set(session.discoveredNetworks);
            isGameOver = session.isGameOver;
            clearUI();
            session.guesses.forEach(g => { guesses.push(g); renderRow(g, false); updateSummaryUI(g); });
            updateEmojiHint();
            if (isGameOver) endGame(guesses.length > 0 && guesses[guesses.length-1].id === targetShow.id);
            else updateGuessesLeft();
        }

        function setMode(mode) {
            if (mode === currentGameMode) return;
            currentGameMode = mode;
            updateStreakUI();
            const saved = localStorage.getItem(`showlee_session_v6_${mode}`);
            if (saved) resumeGame(JSON.parse(saved)); else startNewGame();
        }

        function updateStreakUI() {
            const s = streaks[currentGameMode];
            document.getElementById('currentStreak').textContent = s.current;
            document.getElementById('modeNormal').classList.toggle('active', currentGameMode === 'normal');
            document.getElementById('modeAnime').classList.toggle('active', currentGameMode === 'anime');
            document.getElementById('modeForeign').classList.toggle('active', currentGameMode === 'foreign');
        }

        function selectDifficulty(diff) { currentDifficulty = diff; document.getElementById('difficultyModal').classList.add('hidden'); startNewGame(); }
    </script>
</body>
</html>
