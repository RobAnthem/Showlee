<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showlee - TV Show Guessing Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --bg-dark: #070809;
            --card-bg: rgba(26, 28, 30, 0.6);
            --accent: #d1a01d;
            --correct: #22c55e;
            --partial: #eab308;
            --incorrect: #ef4444;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 50% 0%, #1a1c1e 0%, #070809 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Result Colors with Glassmorphism */
        .correct { 
            background: linear-gradient(145deg, #1b8a32, #146425) !important; 
            border-color: rgba(255,255,255,0.2) !important; 
            color: #000 !important;
            box-shadow: 0 4px 15px rgba(27, 138, 50, 0.3);
        }
        .partial { 
            background: linear-gradient(145deg, #d1a01d, #a37c15) !important; 
            border-color: rgba(255,255,255,0.2) !important; 
            color: #000 !important;
            box-shadow: 0 4px 15px rgba(209, 160, 29, 0.3);
        }
        .incorrect { 
            background: linear-gradient(145deg, #3a0d0d, #250808) !important; 
            border-color: #4a1a1a !important; 
            color: rgba(255,255,255,0.8) !important; 
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 680px;
        }

        .cell {
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 800;
            font-size: 0.7rem;
            line-height: 1.1;
            border: 1px solid var(--border);
            text-transform: uppercase;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            padding: 6px;
            border-radius: 6px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
        }

        .poster-cell { padding: 0; background-size: cover; background-position: center; }
        .poster-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
            padding: 6px; font-size: 0.65rem; text-align: center; color: white;
            backdrop-filter: blur(2px);
        }
        
        .correct .poster-overlay, .partial .poster-overlay { background: transparent; color: #000 !important; font-weight: 900; backdrop-filter: none; }

        .summary-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; width: 100%; max-width: 680px; }
        .summary-box {
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            border-radius: 12px;
            padding: 12px 4px; 
            text-align: center; 
            transition: all 0.4s ease;
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Title always at top */
            gap: 4px;
        }
        
        .summary-box.found { border-color: var(--correct); background: rgba(34, 197, 94, 0.1); box-shadow: inset 0 0 10px rgba(34, 197, 94, 0.1); }
        .summary-box.found .value-text { color: var(--correct); }
        .summary-box.partial-found { border-color: var(--partial); background: rgba(234, 179, 8, 0.1); }

        .hint-container {
            width: 100%; max-width: 680px; background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 16px; padding: 20px; margin-bottom: 16px; text-align: center;
            backdrop-filter: blur(15px);
        }

        .autocomplete-items {
            position: absolute; z-index: 1000; top: 100%; left: 0; right: 0;
            background: #16181a; border: 1px solid #333; max-height: 350px;
            overflow-y: auto; border-radius: 12px; margin-top: 10px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
        }

        .autocomplete-item { 
            padding: 14px; 
            cursor: pointer; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            transition: all 0.2s; 
        }
        .autocomplete-item:hover { background-color: #2d2f35; padding-left: 20px; }

        .mode-btn {
            padding: 8px 16px; font-size: 10px; font-weight: 700; text-transform: uppercase;
            border: 1px solid var(--border); background: transparent; transition: all 0.3s;
            color: #888;
        }
        .mode-btn.active { background: #fff; color: #000; border-color: #fff; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,255,255,0.2); }

        #difficultyModal { background: rgba(0,0,0,0.9); backdrop-filter: blur(12px); }
        .diff-card { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid var(--border); 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .diff-card:hover { 
            border-color: var(--accent); 
            background: rgba(209, 160, 29, 0.05);
            transform: scale(1.02);
        }

        .flip { animation: flip-cell 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes flip-cell { 
            0% { transform: perspective(400px) rotateX(90deg); opacity: 0; } 
            100% { transform: perspective(400px) rotateX(0deg); opacity: 1; } 
        }

        .emoji-slot { 
            display: inline-block; width: 1.8em; height: 1.8em; 
            background: rgba(255,255,255,0.05); 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
            transition: all 0.5s ease;
        }
        
        .progress-bar-bg { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #d1a01d, #fde047); border-radius: 10px; width: 0%; transition: width 0.8s cubic-bezier(0.65, 0, 0.35, 1); }

        input#showInput {
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        input#showInput:focus {
            box-shadow: 0 0 0 4px rgba(209, 160, 29, 0.15);
        }

        .streak-badge {
            background: linear-gradient(135deg, #1a1c1e, #0b0c0d);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 16px;
        }

        .label-text { font-size: 8px; color: #71717a; text-transform: uppercase; font-weight: 700; letter-spacing: 0.1em; }
        .value-text { font-size: 10px; font-weight: 900; }
    </style>
</head>
<body class="flex flex-col items-center p-4">

    <!-- Difficulty Picker -->
    <div id="difficultyModal" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-6">
        <div class="w-full max-w-lg bg-[#0b0c0d] border border-zinc-800 rounded-3xl p-10 shadow-2xl">
            <h3 class="text-3xl font-black italic tracking-tighter mb-2 uppercase text-center">Select Experience</h3>
            <div class="grid grid-cols-1 gap-4 mt-8">
                <div onclick="selectDifficulty('easy')" class="diff-card p-6 rounded-2xl group">
                    <h4 class="font-black text-xl group-hover:text-[#d1a01d]">CINEMA BEGINNER</h4>
                    <p class="text-zinc-500 text-[11px] uppercase tracking-wider">Top 1,500 mainstream titles</p>
                </div>
                <div onclick="selectDifficulty('normal')" class="diff-card p-6 rounded-2xl group">
                    <h4 class="font-black text-xl group-hover:text-[#d1a01d]">TV ENTHUSIAST</h4>
                    <p class="text-zinc-500 text-[11px] uppercase tracking-wider">Top 3,000 global shows</p>
                </div>
                <div onclick="selectDifficulty('hard')" class="diff-card p-6 rounded-2xl group">
                    <h4 class="font-black text-xl group-hover:text-[#d1a01d]">INDUSTRY EXPERT</h4>
                    <p class="text-zinc-500 text-[11px] uppercase tracking-wider">The complete archive</p>
                </div>
            </div>
        </div>
    </div>

    <header class="w-full max-w-2xl flex flex-col items-center py-8 mb-4">
        <div class="flex items-center gap-3 mb-8">
            <h1 class="text-5xl font-black tracking-tighter italic text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.3)]">SHOWLEE</h1>
        </div>
        
        <div class="w-full grid grid-cols-1 md:grid-cols-2 items-center gap-6 px-4">
            <div class="flex flex-col gap-2">
                <span class="text-[10px] font-bold uppercase text-zinc-500 tracking-[0.2em] ml-1">Archive</span>
                <div class="flex overflow-hidden rounded-xl border border-zinc-800 p-1 bg-black/40">
                    <button id="modeNormal" onclick="setMode('normal')" class="mode-btn flex-1 rounded-lg active">Series</button>
                    <button id="modeAnime" onclick="setMode('anime')" class="mode-btn flex-1 rounded-lg">Anime</button>
                    <button id="modeForeign" onclick="setMode('foreign')" class="mode-btn flex-1 rounded-lg">Global</button>
                </div>
            </div>
            <div class="flex justify-end">
                <div class="streak-badge flex flex-col items-center min-w-[100px]">
                    <span class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest mb-1">Win Streak</span>
                    <div class="text-3xl font-black text-[#d1a01d]" id="currentStreak">0</div>
                </div>
            </div>
        </div>
    </header>

    <main class="w-full max-w-2xl flex-grow flex flex-col items-center">
        <div id="gameInterface" class="w-full flex flex-col items-center">
            
            <div id="statusMessage" class="hidden mb-10 p-10 border border-zinc-800 w-full text-center bg-black/60 backdrop-blur-xl rounded-3xl shadow-2xl animate-in fade-in zoom-in duration-500">
                <div class="relative inline-block mb-8">
                    <img id="final-reveal-img" src="" alt="Poster" class="w-32 h-48 object-cover rounded-xl border border-zinc-700 shadow-[0_0_30px_rgba(0,0,0,0.5)] hidden">
                </div>
                <h2 id="statusTitle" class="text-4xl font-black mb-2 italic tracking-tight"></h2>
                <p id="statusDesc" class="text-zinc-400 text-base mb-8"></p>
                <button onclick="startNewGame()" class="bg-white hover:bg-[#d1a01d] transition-colors text-black font-black py-4 px-12 rounded-xl text-xs uppercase tracking-widest">Continue Journey</button>
            </div>

            <div class="summary-grid mb-8">
                <div id="sum-genre" class="summary-box">
                    <span class="label-text">Genre</span>
                    <span class="value-text">?</span>
                </div>
                <div id="sum-date" class="summary-box">
                    <span class="label-text">Release</span>
                    <span class="value-text">...</span>
                </div>
                <div id="sum-seasons" class="summary-box">
                    <span class="label-text">Length</span>
                    <span class="value-text">...</span>
                </div>
                <div id="sum-network" class="summary-box">
                    <span class="label-text">Studio</span>
                    <span class="value-text">?</span>
                </div>
                <div id="sum-origin" class="summary-box">
                    <span class="label-text">Origin</span>
                    <span class="value-text">?</span>
                </div>
                <div id="sum-content-rating" class="summary-box">
                    <span class="label-text">Maturity</span>
                    <span class="value-text">?</span>
                </div>
                <div id="sum-rating" class="summary-box">
                    <span class="label-text">Critic</span>
                    <span class="value-text">?</span>
                </div>
            </div>

            <div id="textHintArea" class="hint-container hidden">
                <div id="plotHintText" class="text-sm font-medium italic text-zinc-300 leading-relaxed"></div>
            </div>

            <div id="emojiHintArea" class="hint-container mb-8">
                <div id="emojiReveal" class="flex justify-center gap-3"></div>
            </div>
            
            <div class="w-full max-w-md px-4 mb-4">
                <div class="progress-bar-bg"><div id="progressBarFill" class="progress-bar-fill"></div></div>
                <div id="guessesLeft" class="text-center text-[9px] uppercase font-bold tracking-[0.3em] text-zinc-500 mt-3">10 ATTEMPTS REMAINING</div>
            </div>

            <div id="inputSection" class="w-full max-w-md mb-12 relative px-4">
                <div class="flex gap-3">
                    <input id="showInput" type="text" placeholder="Search the archive..." autocomplete="off"
                        class="flex-grow bg-[#1a1c1e] border border-zinc-800 p-5 rounded-2xl focus:outline-none focus:border-[#d1a01d] text-sm font-bold placeholder:text-zinc-600">
                    <button id="hintButton" onclick="useHint()" disabled class="border border-zinc-800 text-zinc-500 font-black px-6 rounded-2xl text-[9px] uppercase tracking-widest bg-zinc-900/50 hover:bg-zinc-800 disabled:opacity-30 transition-all">Hint</button>
                </div>
                <div id="autocompleteList" class="autocomplete-items hidden"></div>
            </div>

            <div id="gameBoard" class="flex flex-col gap-3 w-full items-center mb-20"></div>
        </div>
    </main>

    <script>
        const segmenter = new Intl.Segmenter('en', { granularity: 'grapheme' });
        
        let tvShows = [];
        let emojiMetadata = {};
        let hintMetadata = {};
        let targetShow;
        let guesses = [];
        const MAX_GUESSES = 10;
        
        let currentGameMode = 'normal';
        let currentDifficulty = 'normal';
        let minYearBound = 1900, maxYearBound = new Date().getFullYear();
        let minSeasonBound = 1, maxSeasonBound = 100;
        let yearGuessed = false, seasonGuessed = false, hintUsed = false, isGameOver = false;
        let discoveredGenres = new Set(), discoveredNetworks = new Set();
        let streaks = { normal: { current: 0, best: 0 }, anime: { current: 0, best: 0 }, foreign: { current: 0, best: 0 } };

        window.addEventListener('DOMContentLoaded', async () => {
            const savedStreaks = localStorage.getItem('showlee_streaks_v6');
            if (savedStreaks) streaks = JSON.parse(savedStreaks);
            updateStreakUI();

            try {
                const [showsRes, emojiRes, hintRes] = await Promise.all([
                    fetch('enriched_shows_2026-03-07.csv'),
                    fetch('emoji_metadata.csv'),
                    fetch('show_hints.csv')
                ]);

                const showsText = await showsRes.text();
                tvShows = parseCSV(showsText, 'shows');

                if (emojiRes.ok) emojiMetadata = parseCSV(await emojiRes.text(), 'emoji');
                if (hintRes.ok) hintMetadata = parseCSV(await hintRes.text(), 'hint');

                if (tvShows.length > 0) initGame();
            } catch (err) { console.error(err); }
        });

        function parseCSV(text, type) {
            const lines = text.split(/\r?\n/);
            const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
            const data = type === 'shows' ? [] : {};

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const cells = [];
                let cell = "", inQuotes = false;
                for (let char of line) {
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { cells.push(cell.trim()); cell = ""; }
                    else cell += char;
                }
                cells.push(cell.trim());

                if (type === 'shows') {
                    const getIdx = (n) => headers.indexOf(n);
                    data.push({
                        id: cells[getIdx('ID')],
                        title: (cells[getIdx('Name')] || "").replace(/"/g, ''),
                        year: parseInt(cells[getIdx('Year')]) || 0,
                        genres: (cells[getIdx('Genres')] || "").replace(/"/g, '').split(',').map(g => g.trim()).filter(g => g && g !== '-'),
                        country: (cells[getIdx('Country')] || "").replace(/"/g, '') || "??",
                        lang: (cells[getIdx('Language')] || "").replace(/"/g, '').toLowerCase() || "??",
                        seasons: parseInt(cells[getIdx('Seasons')]) || 0,
                        networks: (cells[getIdx('Networks')] || "").replace(/"/g, '').split(',').map(n => n.trim()).filter(n => n && n !== '-'),
                        contentRating: (cells[getIdx('Rating')] || "").replace(/"/g, '') || "NR",
                        score: parseFloat(cells[getIdx('Vote_Average')]) || 0,
                        votes: parseInt(cells[getIdx('Vote_Count')]) || 0,
                        poster: (cells[getIdx('Poster_URL')] || "").replace(/"/g, '').trim()
                    });
                } else {
                    const id = cells[0].replace(/"/g, '');
                    let content = cells[2]?.replace(/"/g, '') || "";
                    if (type === 'hint') {
                        data[id] = content.trim();
                    } else {
                        data[id] = Array.from(segmenter.segment(content)).map(s => s.segment);
                    }
                }
            }
            return data;
        }

        function initGame() {
            const saved = localStorage.getItem(`showlee_session_v6_${currentGameMode}`);
            if (saved) resumeGame(JSON.parse(saved)); else startNewGame();
        }

        function startNewGame() {
            let pool = tvShows.filter(s => {
                const isAnime = s.genres.includes('Animation') && s.country === 'JP';
                const isEnglish = s.lang === 'en';
                if (currentGameMode === 'anime') return isAnime;
                if (currentGameMode === 'normal') return isEnglish && !isAnime;
                return !isEnglish && !isAnime;
            });
            pool.sort((a, b) => b.votes - a.votes);
            if (currentDifficulty === 'easy') pool = pool.slice(0, 1500);
            else if (currentDifficulty === 'normal') pool = pool.slice(0, 3000);
            
            targetShow = pool[Math.floor(Math.random() * pool.length)] || tvShows[0];
            guesses = []; 
            minYearBound = 1900; maxYearBound = new Date().getFullYear();
            minSeasonBound = 1; maxSeasonBound = 100;
            yearGuessed = false; seasonGuessed = false; discoveredGenres = new Set(); discoveredNetworks = new Set();
            hintUsed = false; isGameOver = false;
            
            clearUI();
            updateEmojiHint();
            saveSession();
        }

        function clearUI() {
            document.getElementById('gameBoard').innerHTML = "";
            document.getElementById('showInput').value = "";
            document.getElementById('inputSection').classList.remove('hidden');
            document.getElementById('statusMessage').classList.add('hidden');
            document.getElementById('textHintArea').classList.add('hidden');
            document.getElementById('autocompleteList').classList.add('hidden');
            ['sum-genre', 'sum-date', 'sum-seasons', 'sum-network', 'sum-origin', 'sum-content-rating', 'sum-rating'].forEach(id => {
                const el = document.getElementById(id);
                el.classList.remove('found', 'partial-found');
                const val = el.querySelector('.value-text');
                if (id === 'sum-date') val.textContent = `${minYearBound}—${maxYearBound}`;
                else if (id === 'sum-seasons') val.textContent = `${minSeasonBound}—${maxSeasonBound}`;
                else val.textContent = "?";
            });
            updateGuessesLeft();
        }

        function updateGuessesLeft() {
            const left = MAX_GUESSES - guesses.length;
            document.getElementById('guessesLeft').textContent = `${left} ATTEMPTS REMAINING`;
            document.getElementById('progressBarFill').style.width = `${(guesses.length / MAX_GUESSES) * 100}%`;
            
            const hBtn = document.getElementById('hintButton');
            hBtn.disabled = guesses.length < 4 || hintUsed;
        }

        function updateEmojiHint() {
            const el = document.getElementById('emojiReveal');
            const emojis = emojiMetadata[targetShow.id];
            if (!emojis) { el.innerHTML = "No emoji data"; return; }
            el.innerHTML = '';
            const count = isGameOver ? emojis.length : Math.min(1 + guesses.length, emojis.length);
            for (let i = 0; i < 10; i++) {
                const s = document.createElement('span'); s.className = 'emoji-slot';
                if (i < emojis.length) { 
                    if (i < count) {
                        s.textContent = emojis[i];
                        s.style.background = 'rgba(255,255,255,0.1)';
                    } else {
                        s.textContent = '';
                        s.style.opacity = '0.15';
                    }
                } else {
                    s.style.display = 'none';
                }
                el.appendChild(s);
            }
        }

        function useHint() {
            if (hintUsed || guesses.length < 4) return;
            hintUsed = true;
            document.getElementById('plotHintText').textContent = hintMetadata[targetShow.id] || "No description available.";
            document.getElementById('textHintArea').classList.remove('hidden');
            updateGuessesLeft();
            saveSession();
        }

        function submitGuess(show) {
            if (isGameOver || guesses.some(g => g.id === show.id)) return;
            guesses.push(show);
            renderRow(show, true);
            updateSummaryUI(show);
            updateGuessesLeft();
            updateEmojiHint();
            document.getElementById('showInput').value = "";
            document.getElementById('autocompleteList').classList.add('hidden');
            if (show.id === targetShow.id) endGame(true);
            else if (guesses.length >= MAX_GUESSES) endGame(false);
            else saveSession();
        }

        function renderRow(guess, animate) {
            const row = document.createElement('div');
            row.className = 'game-grid';
            const config = [
                { type: 'p', val: guess.title }, { type: 'g', val: guess.genres },
                { type: 'y', val: guess.year }, { type: 's', val: guess.seasons },
                { type: 'n', val: guess.networks }, { type: 'o', val: { lang: guess.lang, country: guess.country } },
                { type: 'cr', val: guess.contentRating }, { type: 'r', val: guess.score }
            ];
            config.forEach((f, i) => {
                const c = document.createElement('div');
                c.className = 'cell';
                if (animate) { c.classList.add('flip'); c.style.animationDelay = `${i * 60}ms`; }
                if (f.type === 'p') {
                    c.classList.add('poster-cell');
                    if (guess.poster) c.style.backgroundImage = `url(${guess.poster})`;
                    const o = document.createElement('div'); o.className = 'poster-overlay'; o.textContent = f.val;
                    c.appendChild(o);
                    c.classList.add(f.val === targetShow.title ? 'correct' : 'incorrect');
                } else if (f.type === 'g' || f.type === 'n') {
                    const targetArr = f.type === 'g' ? targetShow.genres : targetShow.networks;
                    c.textContent = f.val.slice(0, 2).join(", ");
                    const common = f.val.filter(x => targetArr.includes(x));
                    if (common.length === targetArr.length && f.val.length === targetArr.length) c.classList.add('correct');
                    else if (common.length > 0) c.classList.add('partial'); else c.classList.add('incorrect');
                } else if (f.type === 'o') {
                    c.innerHTML = `<span class="text-[8px] opacity-60">${f.val.lang.toUpperCase()}</span><span>${f.val.country}</span>`;
                    if (f.val.lang === targetShow.lang && f.val.country === targetShow.country) c.classList.add('correct');
                    else if (f.val.lang === targetShow.lang || f.val.country === targetShow.country) c.classList.add('partial'); else c.classList.add('incorrect');
                } else {
                    const tv = f.type === 'y' ? targetShow.year : f.type === 's' ? targetShow.seasons : f.type === 'r' ? targetShow.score : targetShow.contentRating;
                    c.textContent = f.val;
                    if (f.val === tv) c.classList.add('correct');
                    else if (typeof f.val === 'number') {
                        const range = f.type === 'y' ? 5 : f.type === 's' ? 1 : 0.5;
                        c.classList.add(Math.abs(f.val - tv) <= range ? 'partial' : 'incorrect');
                        c.innerHTML = `<div>${f.val}</div><div class="text-[8px] opacity-60">${f.val < tv ? '▲' : '▼'}</div>`;
                    } else c.classList.add('incorrect');
                }
                row.appendChild(c);
            });
            document.getElementById('gameBoard').prepend(row);
        }

        function updateSummaryUI(guess) {
            guess.genres.filter(x => targetShow.genres.includes(x)).forEach(x => discoveredGenres.add(x));
            if (discoveredGenres.size > 0) {
                const el = document.getElementById('sum-genre');
                el.querySelector('.value-text').textContent = Array.from(discoveredGenres).slice(0, 2).join(", ");
                el.className = `summary-box ${discoveredGenres.size === targetShow.genres.length ? 'found' : 'partial-found'}`;
            }
            guess.networks.filter(x => targetShow.networks.includes(x)).forEach(x => discoveredNetworks.add(x));
            if (discoveredNetworks.size > 0) {
                const el = document.getElementById('sum-network');
                el.querySelector('.value-text').textContent = Array.from(discoveredNetworks)[0];
                el.className = `summary-box ${discoveredNetworks.size === targetShow.networks.length ? 'found' : 'partial-found'}`;
            }
            
            // Origin check
            if (guess.lang === targetShow.lang || guess.country === targetShow.country) {
                const el = document.getElementById('sum-origin');
                const isFull = guess.lang === targetShow.lang && guess.country === targetShow.country;
                el.className = `summary-box ${isFull ? 'found' : 'partial-found'}`;
                el.querySelector('.value-text').textContent = isFull ? `${targetShow.lang.toUpperCase()} / ${targetShow.country}` : (guess.lang === targetShow.lang ? targetShow.lang.toUpperCase() : targetShow.country);
            }

            if (!yearGuessed) {
                if (guess.year === targetShow.year) {
                    yearGuessed = true; document.getElementById('sum-date').className = "summary-box found";
                    document.getElementById('sum-date').querySelector('.value-text').textContent = targetShow.year;
                } else if (guess.year > 0) {
                    if (guess.year < targetShow.year) minYearBound = Math.max(minYearBound, guess.year + 1);
                    else maxYearBound = Math.min(maxYearBound, guess.year - 1);
                    document.getElementById('sum-date').querySelector('.value-text').textContent = `${minYearBound}—${maxYearBound}`;
                }
            }

            if (!seasonGuessed) {
                if (guess.seasons === targetShow.seasons) {
                    seasonGuessed = true; document.getElementById('sum-seasons').className = "summary-box found";
                    document.getElementById('sum-seasons').querySelector('.value-text').textContent = targetShow.seasons;
                } else if (guess.seasons > 0) {
                    if (guess.seasons < targetShow.seasons) minSeasonBound = Math.max(minSeasonBound, guess.seasons + 1);
                    else maxSeasonBound = Math.min(maxSeasonBound, guess.seasons - 1);
                    document.getElementById('sum-seasons').querySelector('.value-text').textContent = `${minSeasonBound}—${maxSeasonBound}`;
                }
            }

            ['contentRating', 'score'].forEach(key => {
                if (guess[key] === targetShow[key]) {
                    const id = key === 'contentRating' ? 'sum-content-rating' : 'sum-rating';
                    const el = document.getElementById(id);
                    el.className = "summary-box found"; el.querySelector('.value-text').textContent = targetShow[key];
                }
            });
        }

        function endGame(won) {
            const alreadyOver = isGameOver;
            isGameOver = true;
            document.getElementById('inputSection').classList.add('hidden');
            const sm = document.getElementById('statusMessage');
            sm.classList.remove('hidden');
            
            if (!alreadyOver) {
                const s = streaks[currentGameMode];
                if (won) { s.current++; if (s.current > s.best) s.best = s.current; } else s.current = 0;
                localStorage.setItem('showlee_streaks_v6', JSON.stringify(streaks));
                updateStreakUI();
            }
            
            if (targetShow.poster) {
                const img = document.getElementById('final-reveal-img');
                img.src = targetShow.poster; img.classList.remove('hidden');
            }
            document.getElementById('statusTitle').textContent = won ? "VICTORY" : "GAME OVER";
            document.getElementById('statusTitle').style.color = won ? '#22c55e' : '#ef4444';
            document.getElementById('statusDesc').textContent = `The target show was ${targetShow.title}.`;
            updateEmojiHint();
            saveSession();
        }

        document.getElementById('showInput').addEventListener('input', (e) => {
            const v = e.target.value.toLowerCase().trim();
            const al = document.getElementById('autocompleteList');
            if (v.length < 1) { al.classList.add('hidden'); return; }

            const matches = tvShows.filter(s => s.title.toLowerCase().includes(v))
                .map(s => {
                    const t = s.title.toLowerCase();
                    let score = 0;
                    if (t === v) score += 1000;
                    else if (t.startsWith(v)) score += 500;
                    else if (t.split(' ').some(word => word.startsWith(v))) score += 250;
                    score += Math.min(s.votes / 100, 100);
                    return { s, score };
                })
                .sort((a, b) => b.score - a.score)
                .slice(0, 10);

            al.innerHTML = "";
            if (matches.length) {
                al.classList.remove('hidden');
                matches.forEach(({s}) => {
                    const d = document.createElement('div');
                    d.className = 'autocomplete-item text-sm flex justify-between items-center';
                    d.innerHTML = `
                        <div class="flex flex-col text-left">
                            <span class="text-white font-bold">${s.title}</span>
                            <span class="text-zinc-600 text-[10px] uppercase font-bold tracking-wider">${s.networks[0] || 'Unknown Network'}</span>
                        </div>
                        <span class="text-zinc-500 text-[11px] font-black">${s.year}</span>`;
                    d.onclick = () => submitGuess(s);
                    al.appendChild(d);
                });
            } else al.classList.add('hidden');
        });

        document.addEventListener('click', (e) => {
            if (!document.getElementById('inputSection').contains(e.target)) {
                document.getElementById('autocompleteList').classList.add('hidden');
            }
        });

        function saveSession() {
            localStorage.setItem(`showlee_session_v6_${currentGameMode}`, JSON.stringify({
                targetShow, guesses, minYearBound, maxYearBound, minSeasonBound, maxSeasonBound, 
                yearGuessed, seasonGuessed,
                discoveredGenres: Array.from(discoveredGenres), discoveredNetworks: Array.from(discoveredNetworks),
                hintUsed, isGameOver, difficulty: currentDifficulty
            }));
        }

        function resumeGame(session) {
            targetShow = session.targetShow; guesses = []; 
            minYearBound = session.minYearBound; maxYearBound = session.maxYearBound;
            minSeasonBound = session.minSeasonBound || 1; maxSeasonBound = session.maxSeasonBound || 100;
            yearGuessed = session.yearGuessed; seasonGuessed = session.seasonGuessed || false; 
            hintUsed = session.hintUsed;
            discoveredGenres = new Set(session.discoveredGenres);
            discoveredNetworks = new Set(session.discoveredNetworks);
            isGameOver = session.isGameOver;
            clearUI();
            session.guesses.forEach(g => { guesses.push(g); renderRow(g, false); updateSummaryUI(g); });
            updateEmojiHint();
            if (isGameOver) endGame(guesses.length > 0 && guesses[guesses.length-1].id === targetShow.id);
            else updateGuessesLeft();
        }

        function setMode(mode) {
            if (mode === currentGameMode) return;
            currentGameMode = mode;
            updateStreakUI();
            const saved = localStorage.getItem(`showlee_session_v6_${mode}`);
            if (saved) resumeGame(JSON.parse(saved)); else startNewGame();
        }

        function updateStreakUI() {
            const s = streaks[currentGameMode];
            document.getElementById('currentStreak').textContent = s.current;
            document.getElementById('modeNormal').classList.toggle('active', currentGameMode === 'normal');
            document.getElementById('modeAnime').classList.toggle('active', currentGameMode === 'anime');
            document.getElementById('modeForeign').classList.toggle('active', currentGameMode === 'foreign');
        }

        function selectDifficulty(diff) { currentDifficulty = diff; document.getElementById('difficultyModal').classList.add('hidden'); startNewGame(); }
    </script>
</body>
</html>
