<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showlee - TV Show Guessing Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0c0d;
            color: #ffffff;
            overflow-x: hidden;
        }

        .correct { background-color: #1b8a32 !important; border-color: #146425 !important; color: #ffffff !important; }
        .partial { background-color: #d1a01d !important; border-color: #a37c15 !important; color: #000000 !important; }
        .incorrect { background-color: #c41e1e !important; border-color: #8c1515 !important; color: #ffffff !important; }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            width: 100%;
            max-width: 800px;
        }

        .cell {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 800;
            font-size: 0.75rem;
            border: 2px solid #27272a;
            border-radius: 4px;
            text-transform: uppercase;
            padding: 4px;
            transition: all 0.3s ease;
        }

        .autocomplete-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #27272a;
        }

        .autocomplete-item:hover {
            background-color: #18181b;
        }

        .emoji-hint-container {
            letter-spacing: 0.2em;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        @keyframes flip {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(90deg); opacity: 0.5; }
            100% { transform: rotateY(0deg); opacity: 1; }
        }

        .reveal-anim {
            display: inline-block;
            animation: flip 0.6s ease-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .bounce { animation: bounce 0.5s ease; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <header class="w-full max-w-2xl flex justify-between items-center mb-8 border-b border-zinc-800 pb-4">
        <h1 class="text-3xl font-black tracking-tighter italic">SHOWLEE</h1>
        <div class="flex gap-4">
            <button onclick="surrender()" class="text-xs font-bold text-zinc-500 hover:text-red-500 uppercase tracking-widest">Surrender</button>
        </div>
    </header>

    <div id="emojiDisplay" class="mb-8 text-center p-6 bg-zinc-900/50 rounded-xl border border-zinc-800 w-full max-w-xl">
        <p class="text-[10px] font-black text-zinc-500 uppercase tracking-[0.3em] mb-3">Emoji Clue</p>
        <div id="emojiStory" class="text-3xl md:text-4xl flex flex-wrap justify-center gap-2 emoji-hint-container min-h-[50px]">
            <!-- Emojis injected here -->
        </div>
    </div>

    <div class="w-full max-w-2xl mb-6 relative">
        <input type="text" id="showInput" placeholder="Search for a TV show..." 
               class="w-full bg-zinc-900 border-2 border-zinc-800 rounded-lg py-4 px-6 text-lg font-bold focus:outline-none focus:border-zinc-500 transition-all">
        
        <div id="autocompleteList" class="absolute top-full left-0 right-0 bg-zinc-900 border-2 border-zinc-800 rounded-b-lg mt-1 z-50 hidden max-h-60 overflow-y-auto"></div>
    </div>

    <div id="gameBoard" class="game-grid mb-10">
        <!-- Header row -->
        <div class="text-[9px] font-black text-zinc-500 uppercase text-center pb-2">Title</div>
        <div class="text-[9px] font-black text-zinc-500 uppercase text-center pb-2">Year</div>
        <div class="text-[9px] font-black text-zinc-500 uppercase text-center pb-2">Net</div>
        <div class="text-[9px] font-black text-zinc-500 uppercase text-center pb-2">Gen</div>
        <div class="text-[9px] font-black text-zinc-500 uppercase text-center pb-2">Rank</div>
        <div class="text-[9px] font-black text-zinc-500 uppercase text-center pb-2">Stat</div>
    </div>

    <div id="messageBoard" class="fixed bottom-10 left-1/2 -translate-x-1/2 w-full max-w-md px-4 pointer-events-none"></div>

    <script>
        let tvShows = [];
        let targetShow = null;
        let guesses = [];
        let isGameOver = false;
        let emojiData = {};
        const MAX_EMOJIS = 10;

        async function initGame() {
            try {
                const [showsRes, emojiRes] = await Promise.all([
                    fetch('https://raw.githubusercontent.com/fedeperin/tv-shows-dataset/main/tv-shows-dataset.json'),
                    fetch('emoji_metadata.csv')
                ]);

                tvShows = await showsRes.json();
                const csvText = await emojiRes.text();
                
                const lines = csvText.split('\n').slice(1);
                lines.forEach(line => {
                    const match = line.match(/"(\d+)","(.*?)","(.*?)"/);
                    if (match) {
                        const [_, id, name, emojis] = match;
                        emojiData[id] = emojis;
                    }
                });

                const eligibleShows = tvShows.filter(s => emojiData[s.id]);
                targetShow = eligibleShows[Math.floor(Math.random() * eligibleShows.length)];
                
                updateEmojiDisplay();
                console.log("Target:", targetShow.title);
            } catch (err) {
                console.error("Failed to load data", err);
            }
        }

        function updateEmojiDisplay() {
            const container = document.getElementById('emojiStory');
            const emojiString = emojiData[targetShow.id] || "";
            const emojis = Array.from(emojiString); 
            
            // Revealed count: 1 + number of guesses
            const revealedCount = isGameOver ? emojis.length : Math.min(1 + guesses.length, emojis.length);
            
            container.innerHTML = '';
            
            for (let i = 0; i < MAX_EMOJIS; i++) {
                const span = document.createElement('span');
                if (i < emojis.length) {
                    if (i < revealedCount) {
                        span.innerText = emojis[i];
                        // Add animation class if it's the most recently revealed one
                        if (i === revealedCount - 1 && guesses.length > 0 && !isGameOver) {
                            span.className = 'reveal-anim';
                        }
                    } else {
                        span.innerText = '⚪';
                        span.style.opacity = '0.3';
                    }
                }
                container.appendChild(span);
            }
            
            if (emojis.length === 0) {
                container.innerHTML = '<span class="text-xs text-zinc-600 font-bold uppercase tracking-widest">No Emoji Data For This Show</span>';
            }
        }

        function submitGuess(show) {
            if (isGameOver || guesses.some(g => g.id === show.id)) return;

            guesses.push(show);
            renderGuess(show);
            updateEmojiDisplay();

            if (show.id === targetShow.id) {
                endGame(true);
            } else if (guesses.length >= 6) {
                endGame(false);
            }

            document.getElementById('showInput').value = "";
            document.getElementById('autocompleteList').classList.add('hidden');
        }

        function renderGuess(guess) {
            const board = document.getElementById('gameBoard');
            
            const fields = [
                { val: guess.title, check: guess.title === targetShow.title },
                { val: guess.year, check: guess.year === targetShow.year, partial: Math.abs(guess.year - targetShow.year) <= 2 },
                { val: guess.networks[0], check: targetShow.networks.includes(guess.networks[0]) },
                { val: guess.genres[0], check: targetShow.genres.includes(guess.genres[0]) },
                { val: guess.votes > targetShow.votes ? '↓' : guess.votes < targetShow.votes ? '↑' : '★', check: guess.votes === targetShow.votes },
                { val: guess.status, check: guess.status === targetShow.status }
            ];

            fields.forEach(f => {
                const cell = document.createElement('div');
                cell.className = 'cell bounce';
                cell.innerText = f.val || 'N/A';
                
                if (f.check) cell.classList.add('correct');
                else if (f.partial) cell.classList.add('partial');
                else cell.classList.add('incorrect');
                
                board.appendChild(cell);
            });
        }

        function endGame(win) {
            isGameOver = true;
            updateEmojiDisplay();
            
            const msg = document.getElementById('messageBoard');
            msg.innerHTML = `
                <div class="bg-zinc-800 p-6 rounded-2xl border-2 border-zinc-700 shadow-2xl text-center pointer-events-auto">
                    <h2 class="text-2xl font-black mb-2">${win ? 'CORRECT!' : 'GAME OVER'}</h2>
                    <p class="text-zinc-400 mb-4">The show was <span class="text-white font-bold">${targetShow.title}</span></p>
                    <button onclick="location.reload()" class="w-full bg-white text-black font-black py-3 rounded-lg hover:bg-zinc-200 transition">PLAY AGAIN</button>
                </div>
            `;
        }

        function surrender() {
            if (!isGameOver) endGame(false);
        }

        document.getElementById('showInput').addEventListener('input', (e) => {
            const v = e.target.value.toLowerCase();
            const al = document.getElementById('autocompleteList');
            if (v.length < 2) { al.classList.add('hidden'); return; }

            const matches = tvShows
                .filter(s => s.title.toLowerCase().includes(v))
                .sort((a,b) => b.votes - a.votes)
                .slice(0, 8);

            al.innerHTML = "";
            if (matches.length) {
                al.classList.remove('hidden');
                matches.forEach(m => {
                    const d = document.createElement('div');
                    d.className = 'autocomplete-item text-sm flex justify-between items-center';
                    d.innerHTML = `
                        <div class="flex flex-col">
                            <span class="text-white font-bold">${m.title}</span>
                            <span class="text-zinc-600 text-[10px] uppercase font-bold">${m.networks[0] || 'N/A'}</span>
                        </div>
                        <span class="text-zinc-500 text-[10px] font-black">${m.year}</span>
                    `;
                    d.onclick = () => submitGuess(m);
                    al.appendChild(d);
                });
            } else al.classList.add('hidden');
        });

        document.addEventListener('click', (e) => {
            if (!document.getElementById('showInput').contains(e.target)) {
                document.getElementById('autocompleteList').classList.add('hidden');
            }
        });

        initGame();
    </script>
</body>
</html>
