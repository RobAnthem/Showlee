<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showlee - TV Show Guessing Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121213;
            color: #ffffff;
        }

        /* Color Scheme: Green for correct, Blue for partial, Gray for incorrect */
        .correct { background-color: #538d4e !important; border-color: #538d4e !important; color: #ffffff !important; }
        .partial { background-color: #3b82f6 !important; border-color: #3b82f6 !important; color: #ffffff !important; }
        .incorrect { background-color: #3a3a3c !important; border-color: #3a3a3c !important; color: #ffffff !important; }

        /* Colorblind mode override */
        body.colorblind-mode .correct { background-color: #f5793a !important; border-color: #f5793a !important; }
        body.colorblind-mode .partial { background-color: #85c0f9 !important; border-color: #85c0f9 !important; }
        
        .game-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
            width: 100%;
            max-width: 600px;
        }

        .cell {
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 700;
            font-size: 0.65rem;
            line-height: 1.1;
            border: 2px solid #3a3a3c;
            text-transform: uppercase;
            transition: all 0.3s ease;
            overflow: hidden;
            word-wrap: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
            padding: 4px;
            box-sizing: border-box;
        }

        .poster-cell {
            padding: 0;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .poster-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.65);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            font-size: 0.6rem;
            word-wrap: break-word;
            overflow-wrap: break-word;
            text-align: center;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 600px;
        }

        .summary-box {
            background: #121213;
            border: 2px solid #3a3a3c;
            border-radius: 4px;
            padding: 6px 2px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 60px;
        }
        
        .summary-box.found { border-color: #538d4e; background: #538d4e; }
        .summary-box.partial-found { border-color: #3b82f6; background: #3b82f6; }

        .autocomplete-items {
            position: absolute;
            z-index: 99;
            top: 100%;
            left: 0;
            right: 0;
            background: #121213;
            border: 1px solid #3a3a3c;
            max-height: 250px;
            overflow-y: auto;
        }

        .autocomplete-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #3a3a3c;
        }

        .autocomplete-item:hover { background-color: #2a2a2c; }

        .progress-bar-container {
            width: 100%;
            height: 4px;
            background: #3a3a3c;
            margin: 15px 0;
        }
        
        .progress-bar-fill {
            height: 100%;
            background: #565758;
            width: 0%;
            transition: width 0.3s;
        }

        .mode-btn {
            padding: 4px 16px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            border: 1px solid #3a3a3c;
        }
        .mode-btn.active {
            background: #565758;
            color: white;
            border-color: #565758;
        }
        
        .flip { animation: flip-cell 0.5s ease forwards; }
        @keyframes flip-cell {
            0% { transform: rotateX(90deg); }
            100% { transform: rotateX(0deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-2xl flex flex-col items-center py-4 border-b border-zinc-800 mb-6">
        <h1 class="text-3xl font-black tracking-widest mb-4">SHOWLEE</h1>
        
        <div class="w-full flex justify-between items-end">
            <div class="flex flex-col gap-2">
                <div class="flex">
                    <button id="modeNormal" onclick="setMode('normal')" class="mode-btn active rounded-l">Normal</button>
                    <button id="modeAnime" onclick="setMode('anime')" class="mode-btn rounded-r">Anime</button>
                </div>
                <div class="flex items-center gap-2 text-[10px] text-zinc-500 uppercase font-bold">
                    <span>Colorblind</span>
                    <input type="checkbox" id="colorblindToggle" class="accent-blue-500">
                </div>
            </div>

            <div class="flex flex-col items-end">
                <div class="text-xs font-bold text-zinc-400 uppercase">
                    <span id="streakModeLabel">Normal</span> Streak: <span id="currentStreak" class="text-white">0</span>
                </div>
                <div class="text-[10px] text-zinc-500 uppercase">
                    Best: <span id="bestStreak">0</span>
                </div>
            </div>
        </div>
    </header>

    <main class="w-full max-w-2xl flex flex-col items-center">
        <div id="uploadContainer" class="hidden text-center py-10 border-2 border-dashed border-zinc-800 rounded w-full">
            <p class="text-zinc-400 mb-4">Database not detected locally.</p>
            <label class="bg-white text-black font-bold py-2 px-6 rounded cursor-pointer hover:bg-zinc-200 transition">
                Upload CSV
                <input type="file" id="fileInput" accept=".csv" class="hidden">
            </label>
        </div>

        <div id="gameInterface" class="hidden w-full flex flex-col items-center">
            <div id="statusMessage" class="hidden mb-6 p-6 border-2 border-zinc-800 w-full text-center bg-zinc-900 rounded">
                <img id="final-reveal-img" src="" alt="Poster" class="w-24 h-36 object-cover mx-auto mb-4 hidden rounded border border-zinc-700">
                <h2 id="statusTitle" class="text-xl font-bold mb-1"></h2>
                <p id="statusDesc" class="text-zinc-400 text-sm mb-4"></p>
                <button onclick="startNewGame()" class="bg-white text-black font-bold py-2 px-6 rounded hover:bg-zinc-200 transition text-sm">
                    NEW GAME
                </button>
            </div>

            <div class="summary-grid mb-6">
                <div id="sum-genre" class="summary-box">
                    <span class="text-[9px] text-zinc-500 font-bold uppercase mb-1">Genre</span>
                    <span class="text-[10px] font-bold">?</span>
                </div>
                <div id="sum-date" class="summary-box">
                    <span class="text-[9px] text-zinc-500 font-bold uppercase mb-1">Year</span>
                    <span class="text-[10px] font-bold text-zinc-600">...</span>
                </div>
                <div id="sum-seasons" class="summary-box">
                    <span class="text-[9px] text-zinc-500 font-bold uppercase mb-1">Seas</span>
                    <span class="text-[10px] font-bold">?</span>
                </div>
                <div id="sum-network" class="summary-box">
                    <span class="text-[9px] text-zinc-500 font-bold uppercase mb-1">Netw</span>
                    <span class="text-[10px] font-bold">?</span>
                </div>
                <div id="sum-lang" class="summary-box">
                    <span class="text-[9px] text-zinc-500 font-bold uppercase mb-1">Lang</span>
                    <span class="text-[10px] font-bold">?</span>
                </div>
                <div id="sum-country" class="summary-box">
                    <span class="text-[9px] text-zinc-500 font-bold uppercase mb-1">Ctry</span>
                    <span class="text-[10px] font-bold">?</span>
                </div>
                <div id="sum-rating" class="summary-box">
                    <span class="text-[9px] text-zinc-500 font-bold uppercase mb-1">Score</span>
                    <span class="text-[10px] font-bold">?</span>
                </div>
            </div>

            <div id="inputSection" class="w-full max-w-md mb-8">
                <div class="relative flex gap-2">
                    <input id="showInput" type="text" placeholder="Guess a show..." autocomplete="off"
                        class="flex-grow bg-transparent border-2 border-zinc-700 p-3 focus:outline-none focus:border-zinc-500 text-sm">
                    <button id="hintButton" onclick="useHint()" disabled class="bg-zinc-800 text-zinc-400 font-bold px-4 text-[10px] uppercase disabled:opacity-30">Hint</button>
                    <div id="autocompleteList" class="autocomplete-items hidden"></div>
                </div>
                <div class="progress-bar-container">
                    <div id="progressBarFill" class="progress-bar-fill"></div>
                </div>
                <div id="guessesLeft" class="text-center text-[10px] uppercase font-bold text-zinc-500">
                    10 guesses left
                </div>
            </div>

            <div id="gameBoard" class="flex flex-col gap-1.5 w-full items-center mb-10"></div>
        </div>
    </main>

    <script>
        const languageNames = new Intl.DisplayNames(['en'], {type: 'language'});
        let tvShows = [];
        let targetShow;
        let guesses = [];
        const MAX_GUESSES = 10;
        
        let currentGameMode = 'normal';
        let minYearBound = 1900;
        let maxYearBound = new Date().getFullYear();
        let yearGuessed = false;
        let discoveredGenres = new Set();
        let discoveredNetworks = new Set();
        let hintUsed = false;
        let isGameOver = false;

        let streaks = {
            normal: { current: 0, best: 0 },
            anime: { current: 0, best: 0 }
        };

        const fileInput = document.getElementById('fileInput');
        const gameInterface = document.getElementById('gameInterface');
        const gameBoard = document.getElementById('gameBoard');
        const showInput = document.getElementById('showInput');
        const autocompleteList = document.getElementById('autocompleteList');
        const guessesLeftDisplay = document.getElementById('guessesLeft');
        const progressBarFill = document.getElementById('progressBarFill');
        const hintButton = document.getElementById('hintButton');
        const colorblindToggle = document.getElementById('colorblindToggle');

        window.addEventListener('DOMContentLoaded', async () => {
            const savedStreaks = localStorage.getItem('showlee_streaks_v5');
            if (savedStreaks) streaks = JSON.parse(savedStreaks);
            updateStreakUI();

            const cbPref = localStorage.getItem('showlee_cb');
            if (cbPref === 'true') {
                document.body.classList.add('colorblind-mode');
                colorblindToggle.checked = true;
            }

            try {
                const response = await fetch('tv_metadata_clean_2026-03-07.csv');
                if (!response.ok) throw new Error();
                const text = await response.text();
                tvShows = parseCSV(text);
                if (tvShows.length > 0) initGame();
            } catch (err) {
                document.getElementById('uploadContainer').classList.remove('hidden');
            }
        });

        function setMode(mode) {
            if (mode === currentGameMode) return;
            currentGameMode = mode;
            document.getElementById('modeNormal').classList.toggle('active', mode === 'normal');
            document.getElementById('modeAnime').classList.toggle('active', mode === 'anime');
            document.getElementById('streakModeLabel').textContent = mode.charAt(0).toUpperCase() + mode.slice(1);
            updateStreakUI();
            
            const saved = localStorage.getItem(`showlee_session_v5_${mode}`);
            if (saved) resumeGame(JSON.parse(saved));
            else startNewGame();
        }

        function updateStreakUI() {
            const s = streaks[currentGameMode];
            document.getElementById('currentStreak').textContent = s.current;
            document.getElementById('bestStreak').textContent = s.best;
        }

        colorblindToggle.addEventListener('change', (e) => {
            document.body.classList.toggle('colorblind-mode', e.target.checked);
            localStorage.setItem('showlee_cb', e.target.checked);
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                tvShows = parseCSV(ev.target.result);
                if (tvShows.length > 0) initGame();
            };
            reader.readAsText(file);
        });

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            if (lines.length < 2) return [];
            const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
            const getIdx = (n) => headers.indexOf(n);
            const rows = [];

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                const cells = [];
                let cell = "", inQuotes = false;
                for (let char of line) {
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { cells.push(cell.trim()); cell = ""; }
                    else cell += char;
                }
                cells.push(cell.trim());
                if (cells.length < headers.length - 1) continue;

                const name = cells[getIdx('Name')]?.replace(/"/g, '');
                if (!name || name === '[Deleted/Not Found]') continue;

                rows.push({
                    title: name,
                    year: parseInt(cells[getIdx('Year')]) || 0,
                    genres: (cells[getIdx('Genres')] || "").replace(/"/g, '').split(',').map(g => g.trim()).filter(g => g && g !== '-'),
                    country: cells[getIdx('Country')]?.replace(/"/g, '') || "??",
                    lang: cells[getIdx('Language')]?.replace(/"/g, '') || "??",
                    seasons: parseInt(cells[getIdx('Seasons')]) || 0,
                    networks: (cells[getIdx('Networks')] || "").replace(/"/g, '').split(',').map(n => n.trim()).filter(n => n && n !== '-'),
                    score: parseFloat(cells[getIdx('User_Score')]) || 0,
                    poster: (cells[getIdx('Poster_URL')] || "").replace(/"/g, '').trim()
                });
            }
            return rows;
        }

        function initGame() {
            document.getElementById('uploadContainer').classList.add('hidden');
            gameInterface.classList.remove('hidden');
            const saved = localStorage.getItem(`showlee_session_v5_${currentGameMode}`);
            if (saved) resumeGame(JSON.parse(saved));
            else startNewGame();
        }

        function startNewGame() {
            const pool = tvShows.filter(s => {
                const isAnime = s.country === 'JP';
                if (currentGameMode === 'anime') return isAnime && s.poster && s.score > 0;
                return !isAnime && s.poster && s.year > 1950 && s.score > 0;
            });
            targetShow = pool[Math.floor(Math.random() * pool.length)] || tvShows[0];
            guesses = []; minYearBound = 1900; maxYearBound = new Date().getFullYear();
            yearGuessed = false; discoveredGenres = new Set(); discoveredNetworks = new Set();
            hintUsed = false; isGameOver = false;
            clearUI();
            saveSession();
        }

        function resumeGame(session) {
            targetShow = session.targetShow;
            guesses = []; minYearBound = session.minYearBound; maxYearBound = session.maxYearBound;
            yearGuessed = session.yearGuessed; discoveredGenres = new Set(session.discoveredGenres);
            discoveredNetworks = new Set(session.discoveredNetworks);
            hintUsed = session.hintUsed; isGameOver = session.isGameOver;
            clearUI();
            session.guesses.forEach(g => {
                guesses.push(g);
                renderRow(g, false);
                updateSummaryUI(g);
            });
            if (isGameOver) endGame(guesses.length > 0 && guesses[guesses.length-1].title === targetShow.title, true);
            else updateGuessesLeft();
        }

        function clearUI() {
            gameBoard.innerHTML = "";
            showInput.value = "";
            autocompleteList.classList.add('hidden');
            document.getElementById('inputSection').classList.remove('hidden');
            document.getElementById('statusMessage').classList.add('hidden');
            ['sum-genre', 'sum-date', 'sum-seasons', 'sum-network', 'sum-lang', 'sum-country', 'sum-rating'].forEach(id => {
                const el = document.getElementById(id);
                el.classList.remove('found', 'partial-found');
                const v = el.querySelector('span:last-child');
                v.textContent = id === 'sum-date' ? `${minYearBound} — ${maxYearBound}` : "?";
                v.className = (id === 'sum-date' && !yearGuessed) ? "text-[10px] font-bold text-zinc-600" : "text-[10px] font-bold";
            });
            updateGuessesLeft();
        }

        function saveSession() {
            localStorage.setItem(`showlee_session_v5_${currentGameMode}`, JSON.stringify({
                targetShow, guesses, minYearBound, maxYearBound, yearGuessed,
                discoveredGenres: Array.from(discoveredGenres), discoveredNetworks: Array.from(discoveredNetworks),
                hintUsed, isGameOver
            }));
        }

        function updateGuessesLeft() {
            if (isGameOver) return;
            const left = MAX_GUESSES - guesses.length;
            guessesLeftDisplay.textContent = `${left} guesses left`;
            progressBarFill.style.width = `${(guesses.length / MAX_GUESSES) * 100}%`;
            hintButton.disabled = (guesses.length < 4 || hintUsed);
        }

        function useHint() {
            if (hintUsed || guesses.length < 4 || isGameOver) return;
            hintUsed = true;
            hintButton.disabled = true;
            const unsolved = ['sum-date', 'sum-genre', 'sum-seasons', 'sum-network', 'sum-lang', 'sum-country', 'sum-rating']
                .filter(id => !document.getElementById(id).classList.contains('found'));
            if (unsolved.length === 0) return;
            const cid = unsolved[Math.floor(Math.random() * unsolved.length)];
            const el = document.getElementById(cid);
            el.classList.add('found');
            const v = el.querySelector('span:last-child');
            v.className = "text-[10px] font-bold";
            if (cid === 'sum-genre') v.textContent = targetShow.genres[0];
            else if (cid === 'sum-date') { v.textContent = targetShow.year; yearGuessed = true; }
            else if (cid === 'sum-seasons') v.textContent = targetShow.seasons;
            else if (cid === 'sum-network') v.textContent = targetShow.networks[0];
            else if (cid === 'sum-lang') v.textContent = languageNames.of(targetShow.lang) || targetShow.lang;
            else if (cid === 'sum-country') v.textContent = targetShow.country;
            else if (cid === 'sum-rating') v.textContent = targetShow.score;
            saveSession();
        }

        function submitGuess(show) {
            if (isGameOver || guesses.some(g => g.title === show.title)) return;
            guesses.push(show);
            renderRow(show, true);
            updateSummaryUI(show);
            updateGuessesLeft();
            showInput.value = "";
            autocompleteList.classList.add('hidden');
            if (show.title === targetShow.title) endGame(true);
            else if (guesses.length >= MAX_GUESSES) endGame(false);
            else saveSession();
        }

        function renderRow(guess, animate) {
            const row = document.createElement('div');
            row.className = 'game-grid';
            const config = [
                { type: 'p', val: guess.title },
                { type: 'g', val: guess.genres },
                { type: 'y', val: guess.year },
                { type: 's', val: guess.seasons },
                { type: 'n', val: guess.networks },
                { type: 'l', val: guess.lang },
                { type: 'c', val: guess.country },
                { type: 'r', val: guess.score }
            ];

            config.forEach((f, i) => {
                const c = document.createElement('div');
                c.className = 'cell';
                if (animate) { c.classList.add('flip'); c.style.animationDelay = `${i * 60}ms`; }
                
                if (f.type === 'p') {
                    c.classList.add('poster-cell');
                    if (guess.poster) c.style.backgroundImage = `url(${guess.poster})`;
                    const o = document.createElement('div');
                    o.className = 'poster-overlay';
                    o.textContent = f.val;
                    c.appendChild(o);
                    c.classList.add(f.val === targetShow.title ? 'correct' : 'incorrect');
                } else if (f.type === 'g' || f.type === 'n') {
                    const targetArr = f.type === 'g' ? targetShow.genres : targetShow.networks;
                    c.textContent = f.val.slice(0, 2).join(", ");
                    const common = f.val.filter(x => targetArr.includes(x));
                    if (common.length === targetArr.length && f.val.length === targetArr.length) c.classList.add('correct');
                    else if (common.length > 0) c.classList.add('partial');
                    else c.classList.add('incorrect');
                } else if (f.type === 'y' || f.type === 's' || f.type === 'r') {
                    const tv = f.type === 'y' ? targetShow.year : f.type === 's' ? targetShow.seasons : targetShow.score;
                    const range = f.type === 'y' ? 2 : f.type === 's' ? 1 : 0.5;
                    c.innerHTML = `<div>${f.val}</div>`;
                    if (f.val === tv) c.classList.add('correct');
                    else {
                        c.classList.add(Math.abs(f.val - tv) <= range ? 'partial' : 'incorrect');
                        c.innerHTML += `<div class="text-[8px] opacity-50">${f.val < tv ? '↑' : '↓'}</div>`;
                    }
                } else {
                    const tv = f.type === 'l' ? targetShow.lang : targetShow.country;
                    c.textContent = f.type === 'l' ? f.val.toUpperCase() : f.val;
                    c.classList.add(f.val === tv ? 'correct' : 'incorrect');
                }
                row.appendChild(c);
            });
            gameBoard.prepend(row);
        }

        function updateSummaryUI(guess) {
            const gBox = document.getElementById('sum-genre');
            const commonG = guess.genres.filter(x => targetShow.genres.includes(x));
            commonG.forEach(x => discoveredGenres.add(x));
            if (discoveredGenres.size > 0) {
                gBox.querySelector('span:last-child').textContent = Array.from(discoveredGenres)[0];
                gBox.classList.add(discoveredGenres.size === targetShow.genres.length ? 'found' : 'partial-found');
            }

            const nBox = document.getElementById('sum-network');
            const commonN = guess.networks.filter(x => targetShow.networks.includes(x));
            commonN.forEach(x => discoveredNetworks.add(x));
            if (discoveredNetworks.size > 0) {
                nBox.querySelector('span:last-child').textContent = Array.from(discoveredNetworks)[0];
                nBox.classList.add(discoveredNetworks.size === targetShow.networks.length ? 'found' : 'partial-found');
            }

            if (!yearGuessed) {
                if (guess.year === targetShow.year) {
                    yearGuessed = true;
                    const el = document.getElementById('sum-date');
                    el.classList.add('found');
                    const v = el.querySelector('span:last-child');
                    v.textContent = targetShow.year; v.className = "text-[10px] font-bold";
                } else if (guess.year > 0) {
                    if (guess.year < targetShow.year) minYearBound = Math.max(minYearBound, guess.year);
                    else maxYearBound = Math.min(maxYearBound, guess.year);
                    document.getElementById('sum-date').querySelector('span:last-child').textContent = `${minYearBound}-${maxYearBound}`;
                }
            }

            const map = [['sum-seasons', guess.seasons, targetShow.seasons], ['sum-lang', guess.lang, targetShow.lang], ['sum-country', guess.country, targetShow.country], ['sum-rating', guess.score, targetShow.score]];
            map.forEach(m => {
                const el = document.getElementById(m[0]);
                if (m[1] === m[2]) {
                    el.classList.add('found');
                    el.querySelector('span:last-child').textContent = m[0] === 'sum-lang' ? (languageNames.of(m[1]) || m[1]) : m[1];
                }
            });
        }

        function endGame(won, resumed) {
            isGameOver = true;
            document.getElementById('inputSection').classList.add('hidden');
            const sm = document.getElementById('statusMessage');
            sm.classList.remove('hidden');
            if (!resumed) {
                const s = streaks[currentGameMode];
                if (won) { s.current++; if (s.current > s.best) s.best = s.current; }
                else s.current = 0;
                localStorage.setItem('showlee_streaks_v5', JSON.stringify(streaks));
                updateStreakUI();
            }
            if (targetShow.poster) {
                const img = document.getElementById('final-reveal-img');
                img.src = targetShow.poster; img.classList.remove('hidden');
            }
            const st = document.getElementById('statusTitle');
            st.textContent = won ? "VICTORY" : "OUT OF GUESSES";
            st.className = won ? "text-xl font-bold mb-1 text-green-500" : "text-xl font-bold mb-1 text-red-500";
            document.getElementById('statusDesc').innerHTML = `The show was <b>${targetShow.title}</b>.`;
            saveSession();
        }

        showInput.addEventListener('input', (e) => {
            const v = e.target.value.toLowerCase();
            if (v.length < 2) { autocompleteList.classList.add('hidden'); return; }
            const matches = tvShows.filter(s => s.title.toLowerCase().includes(v)).slice(0, 8);
            autocompleteList.innerHTML = "";
            if (matches.length) {
                autocompleteList.classList.remove('hidden');
                matches.forEach(m => {
                    const d = document.createElement('div');
                    d.className = 'autocomplete-item text-sm flex justify-between';
                    const isM = (currentGameMode === 'anime' && m.country === 'JP') || (currentGameMode === 'normal' && m.country !== 'JP');
                    d.innerHTML = `<span class="${isM ? 'text-white font-bold' : 'text-zinc-500'}">${m.title}</span><span class="text-zinc-500 text-[10px]">${m.year}</span>`;
                    d.onclick = () => submitGuess(m);
                    autocompleteList.appendChild(d);
                });
            } else autocompleteList.classList.add('hidden');
        });

        document.addEventListener('click', (e) => { if (!showInput.contains(e.target)) autocompleteList.classList.add('hidden'); });
    </script>
</body>
</html>
